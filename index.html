<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transpiration Lab: Comparison Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        
        /* UI Elements */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .slider-card { background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #475569; }
        input[type="range"] { width: 100%; margin-bottom: 10px; }
        
        /* Buttons */
        .btn { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .primary { background: #2563eb; color: white; width: 100%; font-size: 1.1rem; }
        .secondary { background: #64748b; color: white; margin-top: 10px; }
        .btn:hover { opacity: 0.9; }

        /* Results Page */
        .stats-summary { margin-top: 20px; padding: 15px; background: #f1f5f9; border-radius: 8px; }
        #chart-wrapper { height: 400px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-page">
        <h1>Lab Setup: Environment Factors</h1>
        <p>Adjust the factors below, then click "Run Experiment" to record the data.</p>
        
        <div class="grid">
            <div class="slider-card">
                <label>Temp: <span id="t-v">25</span>°C</label>
                <input type="range" id="temp" min="5" max="45" value="25" oninput="updateVal('t-v', this.value)">
                
                <label>Light: <span id="l-v">50</span>%</label>
                <input type="range" id="light" min="0" max="100" value="50" oninput="updateVal('l-v', this.value)">
            </div>
            <div class="slider-card">
                <label>Wind: <span id="w-v">5</span> km/h</label>
                <input type="range" id="wind" min="0" max="25" value="5" oninput="updateVal('w-v', this.value)">
                
                <label>Humidity: <span id="h-v">50</span>%</label>
                <input type="range" id="humid" min="10" max="100" value="50" oninput="updateVal('h-v', this.value)">
            </div>
        </div>
        
        <div style="margin-top: 20px;">
            <button class="btn primary" onclick="runExperiment()">Run Experiment & View Data</button>
        </div>
    </div>

    <div id="data-page" class="hidden">
        <h1>Comparison Data</h1>
        <div id="chart-wrapper">
            <canvas id="compChart"></canvas>
        </div>

        <div class="stats-summary">
            <h3>Trial History</h3>
            <div id="trial-list">No trials yet.</div>
        </div>

        <button class="btn secondary" onclick="showSetup()">+ Add Another Trial (Compare)</button>
        <button class="btn secondary" style="background:#e11d48" onclick="resetAll()">Clear All Data</button>
    </div>
</div>

<script>
    let trialCount = 0;
    const colors = ['#2563eb', '#16a34a', '#dc2626', '#ca8a04', '#9333ea'];
    let chart;

    function updateVal(id, val) { document.getElementById(id).innerText = val; }

    function showSetup() {
        document.getElementById('setup-page').classList.remove('hidden');
        document.getElementById('data-page').classList.add('hidden');
    }

    function resetAll() {
        location.reload();
    }

    function runExperiment() {
        trialCount++;
        const T = parseFloat(document.getElementById('temp').value);
        const L = parseFloat(document.getElementById('light').value);
        const W = parseFloat(document.getElementById('wind').value);
        const H = parseFloat(document.getElementById('humid').value);

        // Logic: Calculate data points for a 10-second window
        const baseRate = (T/20) * (1 + L/100) * (1 + W/15) * (1 - H/110);
        let currentTotal = 0;
        let dataPoints = [];
        for (let i = 0; i <= 10; i++) {
            dataPoints.push({x: i, y: parseFloat(currentTotal.toFixed(2))});
            currentTotal += baseRate;
        }

        updateChart(`Trial ${trialCount} (T:${T}, H:${H}%)`, dataPoints);
        
        // Show the results page
        document.getElementById('setup-page').classList.add('hidden');
        document.getElementById('data-page').classList.remove('hidden');
    }

    function updateChart(label, points) {
        const ctx = document.getElementById('compChart').getContext('2d');
        
        if (!chart) {
            chart = new Chart(ctx, {
                type: 'line',
                data: { datasets: [] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { type: 'linear', title: { display: true, text: 'Time (min)' } },
                        y: { title: { display: true, text: 'Water Loss (ml)' } }
                    }
                }
            });
        }

        const newDataset = {
            label: label,
            data: points,
            borderColor: colors[(trialCount - 1) % colors.length],
            backgroundColor: 'transparent',
            borderWidth: 3,
            tension: 0.3
        };

        chart.data.datasets.push(newDataset);
        chart.update();

        // Update list
        const list = document.getElementById('trial-list');
        if(trialCount === 1) list.innerHTML = "";
        list.innerHTML += `<div><strong>${label}</strong> completed.</div>`;
    }
</script>
</body>
</html>
