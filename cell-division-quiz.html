<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cell Division Quiz | Mitosis & Meiosis | Mr. Daniel Ng Biology</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #0f172a;
            margin: 0;
            padding: 24px 20px;
        }
        .quiz-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            padding: 28px 30px 40px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #10b981;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        h1 {
            color: #0f172a;
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 0.25rem;
            border-left: 6px solid #10b981;
            padding-left: 20px;
        }
        .sub {
            color: #475569;
            margin-bottom: 30px;
            padding-bottom: 12px;
            padding-left: 26px;
            font-weight: 500;
            border-bottom: 2px solid #e2e8f0;
        }
        .info-card {
            background: #f1f5f9;
            border-radius: 28px;
            padding: 18px 24px;
            margin-bottom: 32px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .input-group {
            flex: 1 1 180px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-group label {
            font-weight: 700;
            color: #0f172a;
            font-size: 0.85rem;
        }
        .input-group input {
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 32px;
            font-size: 1rem;
            background: white;
            outline: none;
        }
        .input-group input:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }
        .question-block {
            background: #fefdf7;
            border-radius: 28px;
            margin-bottom: 28px;
            padding: 20px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .q-title {
            font-weight: 800;
            font-size: 1.1rem;
            color: #0f172a;
            background: #e2e8f0;
            display: inline-block;
            padding: 4px 18px;
            border-radius: 40px;
            margin-bottom: 16px;
        }
        .q-text {
            font-size: 1.05rem;
            font-weight: 600;
            margin: 12px 0 18px 0;
            color: #1e293b;
            line-height: 1.45;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 16px 0 10px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #ffffff;
            padding: 8px 16px;
            border-radius: 48px;
            border: 1px solid #cbd5e1;
            cursor: pointer;
        }
        .option:hover {
            background: #f8fafc;
        }
        input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #10b981;
            margin: 0;
            cursor: pointer;
        }
        .option label {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
        }
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin: 30px 0 20px;
        }
        button {
            background: #10b981;
            border: none;
            padding: 12px 32px;
            border-radius: 44px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #059669;
            transform: scale(0.98);
        }
        .reset-btn {
            background: #64748b;
        }
        .reset-btn:hover {
            background: #475569;
        }
        .score-area {
            background: #d1fae5;
            border-radius: 32px;
            padding: 14px 24px;
            margin: 20px 0 16px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #065f46;
            text-align: center;
            border-left: 6px solid #10b981;
        }
        .explanation-area {
            background: #fef3c7;
            border-radius: 24px;
            padding: 18px 24px;
            margin-top: 10px;
            border: 1px solid #fde68a;
        }
        .explanation-title {
            font-weight: 800;
            margin-bottom: 12px;
            font-size: 1.1rem;
            color: #b45309;
        }
        .ai-explain {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .exp-item {
            padding: 8px 0;
            border-bottom: 1px dashed #fcd34d;
        }
        .exp-q {
            font-weight: 700;
            color: #78350f;
        }
        .exp-text {
            margin-top: 5px;
            color: #451a03;
            line-height: 1.4;
            font-size: 0.9rem;
        }
        .footer-note {
            font-size: 0.7rem;
            text-align: center;
            color: #94a3b8;
            margin-top: 28px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }
        @media (max-width: 680px) {
            .quiz-container {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <a href="index.html" class="back-link">← Back to Home</a>
    <h1>🔬 Cell Division Quiz</h1>
    <div class="sub">HKDSE Biology | Mitosis & Meiosis</div>

    <!-- Student Information Section -->
    <div class="info-card">
        <div class="input-group">
            <label>📝 Student Name</label>
            <input type="text" id="studentName" placeholder="e.g., Chan Tai Man">
        </div>
        <div class="input-group">
            <label>🏫 Class</label>
            <input type="text" id="classGroup" placeholder="e.g., 6A">
        </div>
        <div class="input-group">
            <label>🔢 Student Number</label>
            <input type="text" id="studentId" placeholder="e.g., 23 or S001">
        </div>
    </div>

    <div id="questionsContainer"></div>

    <div class="action-buttons">
        <button id="submitBtn">✅ Submit & Send Report</button>
        <button id="resetBtn" class="reset-btn">🔄 Reset Answers</button>
    </div>

    <div id="scoreDisplay" class="score-area" style="display: none;"></div>
    <div id="aiExplanations" class="explanation-area" style="display: none;">
        <div class="explanation-title">🤖 AI Model Answers & Explanations</div>
        <div id="explanationsList" class="ai-explain"></div>
    </div>
    <div class="footer-note">✔️ 20 marks per question. Total: 100 marks. Your report will be sent to your teacher via email after submission.</div>
</div>

<script>
    // ======================== MITOSIS & MEIOSIS QUESTION BANK (HKDSE Level) ========================
    const QUESTIONS = [
        {
            text: "During mitosis in an animal cell, which of the following events occurs in anaphase?",
            options: [
                "A. Chromosomes align at the metaphase plate",
                "B. Sister chromatids separate and move toward opposite poles",
                "C. The nuclear envelope reforms",
                "D. Homologous chromosomes pair up"
            ],
            correct: 1,
            explanation: "✅ Correct answer: B. During anaphase of mitosis, the centromeres split and sister chromatids are pulled apart by spindle fibers toward opposite poles. Option A occurs in metaphase; C occurs in telophase; D occurs in meiosis I prophase."
        },
        {
            text: "Which of the following is a key difference between meiosis I and mitosis?",
            options: [
                "A. DNA replicates once and the cell divides once",
                "B. Homologous chromosomes separate, reducing chromosome number by half",
                "C. Sister chromatids separate",
                "D. Spindle fibers attach to centromeres"
            ],
            correct: 1,
            explanation: "✅ Correct answer: B. The hallmark of meiosis I is the separation of homologous chromosomes, resulting in daughter cells with half the chromosome number (from 2n to n). Mitosis maintains the chromosome number. A describes mitosis; C occurs in anaphase of mitosis and meiosis II; D occurs in both processes."
        },
        {
            text: "Regarding chromosome number, after mitosis of a human liver cell (a somatic cell), how many chromosomes will each daughter cell have?",
            options: [
                "A. 23",
                "B. 46",
                "C. 92",
                "D. Randomly variable"
            ],
            correct: 1,
            explanation: "✅ Correct answer: B. Human somatic cells have 46 chromosomes (23 pairs). Mitosis produces two genetically identical daughter cells, each retaining 46 chromosomes. Meiosis produces gametes with 23 chromosomes."
        },
        {
            text: "A student observes a root tip cell of a plant under a microscope. The chromosomes are aligned at the equator (metaphase plate). Which stage of mitosis is this cell in?",
            options: [
                "A. Prophase",
                "B. Metaphase",
                "C. Anaphase",
                "D. Telophase"
            ],
            correct: 1,
            explanation: "✅ Correct answer: B. During metaphase, chromosomes line up at the metaphase plate (equator) of the cell. Prophase shows condensed chromosomes but no alignment; anaphase shows separated chromatids; telophase shows chromosomes at poles and nuclear envelope reformation."
        },
        {
            text: "During oogenesis in humans, the primary oocyte completes meiosis I and produces:",
            options: [
                "A. Two secondary oocytes",
                "B. One secondary oocyte and one polar body",
                "C. Two egg cells",
                "D. One egg cell and three polar bodies"
            ],
            correct: 1,
            explanation: "✅ Correct answer: B. The primary oocyte (2n) undergoes meiosis I, producing one secondary oocyte (n) and one first polar body (n). The secondary oocyte then undergoes meiosis II to produce an ovum and a second polar body."
        }
    ];

    let userAnswers = new Array(QUESTIONS.length).fill(null);
    let submitted = false;

    const questionsContainer = document.getElementById('questionsContainer');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const scoreDisplayDiv = document.getElementById('scoreDisplay');
    const aiExplanationsDiv = document.getElementById('aiExplanations');
    const explanationsList = document.getElementById('explanationsList');

    function renderQuestions() {
        questionsContainer.innerHTML = '';
        QUESTIONS.forEach((q, idx) => {
            const qDiv = document.createElement('div');
            qDiv.classList.add('question-block');
            
            const qTitle = document.createElement('div');
            qTitle.classList.add('q-title');
            qTitle.innerText = `Question ${idx+1} (20 marks)`;
            qDiv.appendChild(qTitle);
            
            const qText = document.createElement('div');
            qText.classList.add('q-text');
            qText.innerText = q.text;
            qDiv.appendChild(qText);
            
            const optsDiv = document.createElement('div');
            optsDiv.classList.add('options');
            
            q.options.forEach((opt, optIdx) => {
                const optionWrap = document.createElement('div');
                optionWrap.classList.add('option');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q${idx}`;
                radio.value = optIdx;
                radio.id = `q${idx}_opt${optIdx}`;
                if (userAnswers[idx] === optIdx) radio.checked = true;
                radio.addEventListener('change', () => { userAnswers[idx] = optIdx; });
                const label = document.createElement('label');
                label.htmlFor = `q${idx}_opt${optIdx}`;
                label.innerText = opt;
                optionWrap.appendChild(radio);
                optionWrap.appendChild(label);
                optsDiv.appendChild(optionWrap);
            });
            qDiv.appendChild(optsDiv);
            questionsContainer.appendChild(qDiv);
        });
    }

    function computeScoreAndDetails() {
        let totalScore = 0;
        const details = [];
        for (let i = 0; i < QUESTIONS.length; i++) {
            const userSel = userAnswers[i];
            const correctIdx = QUESTIONS[i].correct;
            const isCorrect = (userSel !== null && userSel === correctIdx);
            if (isCorrect) totalScore += 20;
            details.push({
                qNum: i+1,
                questionText: QUESTIONS[i].text,
                studentAnswer: (userSel !== null) ? QUESTIONS[i].options[userSel] : "Not answered",
                correctAnswer: QUESTIONS[i].options[correctIdx],
                isCorrect: isCorrect,
                explanation: QUESTIONS[i].explanation
            });
        }
        return { totalScore, details };
    }

    function renderExplanations(details) {
        explanationsList.innerHTML = '';
        for (let det of details) {
            const itemDiv = document.createElement('div');
            itemDiv.classList.add('exp-item');
            const statusIcon = det.isCorrect ? '✅' : '❌';
            const qHeader = document.createElement('div');
            qHeader.classList.add('exp-q');
            qHeader.innerHTML = `${statusIcon} Question ${det.qNum}: Your answer: "${det.studentAnswer}" | Correct answer: "${det.correctAnswer}"`;
            const expTextDiv = document.createElement('div');
            expTextDiv.classList.add('exp-text');
            expTextDiv.innerHTML = `📖 ${det.explanation}`;
            itemDiv.appendChild(qHeader);
            itemDiv.appendChild(expTextDiv);
            explanationsList.appendChild(itemDiv);
        }
    }

    async function sendEmailReport(studentName, studentClass, studentIdNum, totalScore, details) {
        let answersSummary = '';
        details.forEach(d => {
            answersSummary += `\n[Question ${d.qNum}] ${d.questionText}\nStudent answer: ${d.studentAnswer} | Correct answer: ${d.correctAnswer} | ${d.isCorrect ? 'Correct' : 'Incorrect'}\nAI Explanation: ${d.explanation}\n`;
        });
        
        const fullMessage = `
📋 Cell Division Quiz Report (Mitosis & Meiosis)
----------------------------------------
👤 Student Name: ${studentName}
🏫 Class: ${studentClass}
🔢 Student Number: ${studentIdNum}
🏆 Total Score: ${totalScore} / 100

📌 Answer Details & AI Explanations:
${answersSummary}
----------------------------------------
Report automatically generated by Mr. Daniel Ng Biology Quiz System
        `;
        
        const formData = new FormData();
        formData.append('access_key', 'f8697ff5-0b11-4d52-9d70-657a0028e31c');
        formData.append('email', 'ngtinghei0803@gmail.com');
        formData.append('subject', `[Cell Division Quiz] ${studentName} - ${studentClass} (${studentIdNum})`);
        formData.append('message', fullMessage);
        
        try {
            const response = await fetch('https://api.web3forms.com/submit', { method: 'POST', body: formData });
            const result = await response.json();
            if (result.success) alert(`✅ Report sent successfully to your teacher!\nYour score: ${totalScore}/100`);
            else alert(`⚠️ Email sending failed: ${result.message || 'Please try again later'}. Your score is displayed below.`);
        } catch (err) {
            alert(`⚠️ Could not connect to email service. Your score: ${totalScore}/100. Please take a screenshot.`);
        }
    }

    function validateStudentInfo() {
        const name = document.getElementById('studentName').value.trim();
        const className = document.getElementById('classGroup').value.trim();
        const stuId = document.getElementById('studentId').value.trim();
        if (!name || !className || !stuId) {
            alert('Please fill in your name, class, and student number before submitting.');
            return false;
        }
        return { name, className, stuId };
    }

    function allQuestionsAnswered() {
        for (let i = 0; i < userAnswers.length; i++) {
            if (userAnswers[i] === null) {
                alert(`⚠️ You haven't answered Question ${i+1}. Please complete all questions.`);
                return false;
            }
        }
        return true;
    }

    async function onSubmit() {
        if (submitted) {
            alert('You have already submitted this quiz. Press "Reset Answers" if you want to try again.');
            return;
        }
        const info = validateStudentInfo();
        if (!info) return;
        if (!allQuestionsAnswered()) return;
        
        const { totalScore, details } = computeScoreAndDetails();
        scoreDisplayDiv.style.display = 'block';
        scoreDisplayDiv.innerHTML = `📊 Your Score: ${totalScore} / 100 (20 marks per question)`;
        renderExplanations(details);
        aiExplanationsDiv.style.display = 'block';
        scoreDisplayDiv.scrollIntoView({ behavior: 'smooth' });
        
        await sendEmailReport(info.name, info.className, info.stuId, totalScore, details);
        submitted = true;
    }

    function resetQuiz() {
        userAnswers.fill(null);
        renderQuestions();
        submitted = false;
        scoreDisplayDiv.style.display = 'none';
        aiExplanationsDiv.style.display = 'none';
        explanationsList.innerHTML = '';
    }

    renderQuestions();
    submitBtn.addEventListener('click', onSubmit);
    resetBtn.addEventListener('click', resetQuiz);
</script>
</body>
</html>
