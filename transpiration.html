<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transpiration Lab: Plateau Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #059669; --bg: #f0fdf4; --card: #ffffff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1f2937; }
        .container { max-width: 1100px; margin: auto; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        .control-panel { background: #f8fafc; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; }
        h1 { margin-top: 0; color: #065f46; border-bottom: 2px solid #bcf0da; padding-bottom: 10px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.9rem; }
        input[type="range"] { width: 100%; margin-bottom: 20px; accent-color: var(--primary); }
        .val-box { float: right; color: var(--primary); font-weight: bold; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 1rem; }
        .btn-run { background: var(--primary); color: white; margin-bottom: 10px; }
        .btn-clear { background: #ef4444; color: white; }
        #chart-wrapper { position: relative; height: 500px; }
        .hidden { display: none; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Transpiration Rate Interactive Lab</h1>
    
    <div class="grid">
        <div class="control-panel">
            <h3>Environment Setup</h3>
            
            <label>Temperature <span class="val-box" id="v-temp">25</span>°C</label>
            <input type="range" id="temp" min="5" max="55" value="25" oninput="updateUI('v-temp', this.value)">
            
            <label>Light Intensity <span class="val-box" id="v-light">50</span>%</label>
            <input type="range" id="light" min="0" max="100" value="50" oninput="updateUI('v-light', this.value)">
            
            <label>Wind Speed <span class="val-box" id="v-wind">5</span> km/h</label>
            <input type="range" id="wind" min="0" max="40" value="5" oninput="updateUI('v-wind', this.value)">
            
            <label>Humidity <span class="val-box" id="v-humid">40</span>%</label>
            <input type="range" id="humid" min="0" max="100" value="40" oninput="updateUI('v-humid', this.value)">

            <button class="btn btn-run" onclick="runTrial()" id="run-btn">Run 120min Trial</button>
            <button class="btn btn-clear" onclick="location.reload()">Reset All Data</button>
            
            <div id="status" class="hidden" style="margin-top:15px; text-align:center;">
                <div class="loader"></div> <span>Recording Data...</span>
            </div>
        </div>

        <div id="chart-wrapper">
            <canvas id="plateauChart"></canvas>
        </div>
    </div>
</div>

<script>
    let chart;
    let trialCount = 0;
    const colors = ['#059669', '#2563eb', '#7c3aed', '#db2777', '#ea580c'];

    function updateUI(id, val) { document.getElementById(id).innerText = val; }

    function runTrial() {
        const btn = document.getElementById('run-btn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        status.classList.remove('hidden');

        setTimeout(() => {
            generateData();
            btn.disabled = false;
            status.classList.add('hidden');
        }, 800);
    }

    function generateData() {
        trialCount++;
        const T = parseFloat(document.getElementById('temp').value);
        const L = parseFloat(document.getElementById('light').value);
        const W = parseFloat(document.getElementById('wind').value);
        const H = parseFloat(document.getElementById('humid').value);

        // --- THE PLATEAU MATH ---
        // 1. Environmental Driving Force (S)
        const S = (T * 0.5) + (L * 0.3) + (W * 0.7);
        
        // 2. Humidity Inhibition (The "Brake")
        const humidityMultiplier = Math.max(0.01, (100 - H) / 100);

        // 3. Michaelis-Menten Saturation: Rate = (Vmax * S) / (K + S)
        // This ensures the rate of change slows down as S increases.
        const Vmax = 3.5; 
        const K = 30; 
        const hourlyRate = ((Vmax * S) / (K + S)) * humidityMultiplier;

        let points = [];
        let totalWaterLoss = 0;
        
        // We simulate 120 minutes in 5-minute intervals
        for (let m = 0; m <= 120; m += 5) {
            points.push({x: m, y: totalWaterLoss.toFixed(2)});
            
            // Adding a "Diminishing Returns" factor as time goes on
            // Simulates the plant losing turgor pressure or stomata closing 
            // slightly after prolonged exposure to stress.
            const timeFatigue = 1 - (m / 600); 
            const jitter = 1 + (Math.random() * 0.02 - 0.01);
            
            totalWaterLoss += (hourlyRate * (5/60) * timeFatigue * jitter);
        }

        updateChart(`Trial ${trialCount} (Temp: ${T}°, Humid: ${H}%)`, points);
    }

    function updateChart(label, data) {
        const ctx = document.getElementById('plateauChart').getContext('2d');
        
        if (!chart) {
            chart = new Chart(ctx, {
                type: 'line',
                data: { datasets: [] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { type: 'linear', title: { display: true, text: 'Time (Minutes)' }, max: 120 },
                        y: { title: { display: true, text: 'Total Water Uptake (ml)' }, min: 0 }
                    },
                    plugins: {
                        legend: { position: 'top' },
                        tooltip: { mode: 'index', intersect: false }
                    }
                }
            });
        }

        chart.data.datasets.push({
            label: label,
            data: data,
            borderColor: colors[(trialCount - 1) % colors.length],
            backgroundColor: 'transparent',
            borderWidth: 3,
            tension: 0.4, // Creates the smooth biological curve
            pointRadius: 2
        });
        
        chart.update();
    }
</script>

</body>
</html>
