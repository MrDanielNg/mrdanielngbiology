<body>
<div class="main-container">
    <a href="index.html" class="back-link">← Back to Home</a>
    <h1>🔬 Cell Division Interactive Lab</h1>
    <div class="sub">Enhanced visual simulation | Clear chromosomes, spindle fibers, and separation</div>

    <!-- Mode Toggle Buttons -->
    <div class="mode-toggle">
        <button id="mitosisModeBtn" class="mode-btn mode-mitosis">🌱 Mitosis (Asexual)</button>
        <button id="meiosisModeBtn" class="mode-btn mode-meiosis inactive">🥚 Meiosis (Sexual)</button>
    </div>

    <!-- Simulator Container (only one active at a time) -->
    <div id="simulatorContainer"></div>

    <!-- Quiz Section -->
    <div class="quiz-section">
        <h2 style="color:#0f172a; margin-bottom:16px;">📝 Cell Division Quiz</h2>
        <div class="info-card">
            <div class="input-group"><label>📝 Student Name</label><input type="text" id="studentName" placeholder="e.g., Chan Tai Man"></div>
            <div class="input-group"><label>🏫 Class</label><input type="text" id="classGroup" placeholder="e.g., 6A"></div>
            <div class="input-group"><label>🔢 Student Number</label><input type="text" id="studentId" placeholder="e.g., 23"></div>
        </div>
        <div id="questionsContainer"></div>
        <div class="action-buttons">
            <button id="submitBtn">✅ Submit & Send Report</button>
            <button id="resetQuizBtn" class="reset-btn">🔄 Reset Answers</button>
        </div>
        <div id="scoreDisplay" class="score-area" style="display: none;"></div>
        <div id="aiExplanations" class="explanation-area" style="display: none;">
            <div class="explanation-title">🤖 AI Model Answers & Explanations</div>
            <div id="explanationsList"></div>
        </div>
        <div class="footer-note">✔️ 20 marks per question. Report sent to teacher via email.</div>
    </div>
</div>

<script>
    // ============================================================
    // MITOSIS SIMULATOR (CLEAR & ENHANCED)
    // ============================================================
    let currentMode = 'mitosis'; // 'mitosis' or 'meiosis'
    let mitosisStep = 0, mitosisTarget = 0;
    let meiosisStep = 0, meiosisTarget = 0;
    let mitosisAuto = false, meiosisAuto = false;
    let mitosisInterval = null, meiosisInterval = null;
    let mitosisCanvas, meiosisCanvas, ctxM, ctxMe;
    
    const mitosisStages = [
        { name: "Interphase", desc: "🔬 DNA replicates. Chromosomes are loose (chromatin). Centrosomes duplicate. Nucleus visible." },
        { name: "Prophase", desc: "🎯 Chromosomes condense & become visible as thick rods. Nuclear envelope breaks down. Spindle fibers appear." },
        { name: "Metaphase", desc: "⚡ Chromosomes align at the equatorial plate (middle). Spindle fibers attach to centromeres." },
        { name: "Anaphase", desc: "💥 Sister chromatids SEPARATE and move to opposite poles. Clear V-shape motion!" },
        { name: "Telophase", desc: "🧬 Chromosomes arrive at poles, decondense. Nuclear membranes reform. Cytokinesis splits cytoplasm." }
    ];
    
    const meiosisStages = [
        { name: "Prophase I (Pairing)", desc: "🧬 Homologous chromosomes pair up (synapsis). Crossing over occurs. Each pair = bivalent." },
        { name: "Metaphase I", desc: "📏 Homologous pairs align at equator. Independent assortment creates variation." },
        { name: "Anaphase I", desc: "💢 Homologous chromosomes SEPARATE (sister chromatids stay together). Clear division!" },
        { name: "Telophase I & Meiosis II", desc: "🔄 Two haploid cells form. Then Meiosis II separates sister chromatids → 4 gametes." },
        { name: "Final Gametes", desc: "🎯 4 genetically unique haploid cells (sperm/egg). Crossing over + assortment create diversity." }
    ];
    
    // Draw Mitosis with enhanced visibility
    function drawMitosis() {
        if (!mitosisCanvas) return;
        const canvas = mitosisCanvas;
        const ctx = ctxM;
        const w = canvas.width, h = canvas.height;
        const cx = w/2, cy = h/2;
        const stage = mitosisTarget;
        
        ctx.clearRect(0, 0, w, h);
        
        // Cell membrane
        ctx.beginPath();
        ctx.ellipse(cx, cy, w*0.42, h*0.44, 0, 0, 2*Math.PI);
        ctx.fillStyle = "#fffaf0";
        ctx.fill();
        ctx.strokeStyle = "#94a3b8";
        ctx.lineWidth = 2.5;
        ctx.stroke();
        
        // Nuclear envelope (visible in interphase/prophase)
        if (stage <= 1) {
            ctx.beginPath();
            ctx.arc(cx, cy, 55, 0, 2*Math.PI);
            ctx.fillStyle = "rgba(226,232,240,0.4)";
            ctx.fill();
            ctx.strokeStyle = "#475569";
            ctx.setLineDash([6,8]);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        // Spindle fibers (prophase to anaphase)
        if (stage >= 1 && stage <= 3) {
            ctx.beginPath();
            ctx.strokeStyle = "#f59e0b";
            ctx.lineWidth = 2;
            for (let ang = -40; ang <= 40; ang += 20) {
                ctx.beginPath();
                ctx.moveTo(cx - 90, cy + ang*0.7);
                ctx.lineTo(cx + 90, cy - ang*0.6);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx - 90, cy - ang*0.6);
                ctx.lineTo(cx + 90, cy + ang*0.7);
                ctx.stroke();
            }
            // Centrosomes
            ctx.fillStyle = "#d97706";
            ctx.fillRect(cx-88, cy-8, 12, 12);
            ctx.fillRect(cx+76, cy-8, 12, 12);
        }
        
        // Draw chromosomes based on stage
        const isAnaphase = (stage === 3);
        const isMetaphase = (stage === 2);
        
        function drawChromosomePair(x, y, separated) {
            ctx.fillStyle = "#4f46e5";
            if (separated) {
                ctx.fillRect(x-10, y-12, 8, 26);
                ctx.fillRect(x+2, y-12, 8, 26);
                ctx.fillStyle = "#fbbf24";
                ctx.beginPath();
                ctx.arc(x-4, y, 4, 0, 2*Math.PI);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x+4, y, 4, 0, 2*Math.PI);
                ctx.fill();
            } else {
                ctx.fillRect(x-9, y-14, 8, 30);
                ctx.fillRect(x+1, y-14, 8, 30);
                ctx.fillStyle = "#facc15";
                ctx.beginPath();
                ctx.arc(x-3, y, 5, 0, 2*Math.PI);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x+3, y, 5, 0, 2*Math.PI);
                ctx.fill();
            }
        }
        
        if (isAnaphase) {
            // Separating to poles
            for (let i = 0; i < 4; i++) {
                drawChromosomePair(cx - 50 - i*5, cy - 10 + (i%2)*20, true);
                drawChromosomePair(cx + 40 + i*5, cy - 10 + (i%2)*20, true);
            }
        } else if (stage === 4) {
            // Telophase - two cells forming
            drawChromosomePair(cx-45, cy-15, false);
            drawChromosomePair(cx-45, cy+12, false);
            drawChromosomePair(cx+40, cy-15, false);
            drawChromosomePair(cx+40, cy+12, false);
            ctx.beginPath();
            ctx.moveTo(cx-85, cy+18);
            ctx.quadraticCurveTo(cx, cy+40, cx+85, cy+18);
            ctx.strokeStyle = "#f97316";
            ctx.lineWidth = 3;
            ctx.stroke();
        } else if (isMetaphase) {
            // Aligned at equator
            const positions = [[cx-55, cy-5], [cx-25, cy-8], [cx+10, cy-5], [cx+45, cy-10]];
            positions.forEach(pos => drawChromosomePair(pos[0], pos[1], false));
        } else {
            // Interphase or prophase - scattered
            const positions = [[cx-40, cy-25], [cx-20, cy+10], [cx+10, cy-20], [cx+45, cy+5]];
            positions.forEach(pos => drawChromosomePair(pos[0], pos[1], false));
        }
    }
    
    // Draw Meiosis with clear homologous pairing and separation
    function drawMeiosis() {
        if (!meiosisCanvas) return;
        const ctx = ctxMe;
        const w = meiosisCanvas.width, h = meiosisCanvas.height;
        const cx = w/2, cy = h/2;
        const stage = meiosisTarget;
        
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = "#fffbf0";
        ctx.fillRect(0, 0, w, h);
        
        ctx.beginPath();
        ctx.ellipse(cx, cy, w*0.42, h*0.44, 0, 0, 2*Math.PI);
        ctx.fillStyle = "#fff7ed";
        ctx.fill();
        ctx.strokeStyle = "#cbd5e1";
        ctx.stroke();
        
        // Spindle fibers
        if (stage <= 2) {
            ctx.strokeStyle = "#f97316aa";
            ctx.lineWidth = 1.8;
            for (let i = -35; i <= 35; i += 18) {
                ctx.beginPath();
                ctx.moveTo(cx-85, cy+i);
                ctx.lineTo(cx+85, cy-i*0.7);
                ctx.stroke();
            }
            ctx.fillStyle = "#ea580c";
            ctx.fillRect(cx-83, cy-7, 10, 10);
            ctx.fillRect(cx+73, cy-7, 10, 10);
        }
        
        function drawHomolog(x1, y1, x2, y2, paired) {
            ctx.fillStyle = "#dc2626";
            ctx.fillRect(x1-7, y1-12, 8, 26);
            ctx.fillStyle = "#3b82f6";
            ctx.fillRect(x2-7, y2-12, 8, 26);
            if (paired) {
                ctx.beginPath();
                ctx.setLineDash([4,6]);
                ctx.strokeStyle = "#facc15";
                ctx.lineWidth = 2;
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }
        
        if (stage === 0) { // Prophase I - paired
            drawHomolog(cx-40, cy-15, cx-10, cy-12, true);
            drawHomolog(cx+5, cy+5, cx+35, cy+2, true);
            drawHomolog(cx-25, cy+25, cx+15, cy+22, true);
        } else if (stage === 1) { // Metaphase I - aligned
            drawHomolog(cx-45, cy-8, cx-20, cy-8, true);
            drawHomolog(cx+5, cy-8, cx+30, cy-8, true);
            drawHomolog(cx-20, cy+22, cx+10, cy+22, true);
        } else if (stage === 2) { // Anaphase I - separating
            drawHomolog(cx-65, cy-10, cx-40, cy-10, false);
            drawHomolog(cx+35, cy-10, cx+60, cy-10, false);
            drawHomolog(cx-55, cy+20, cx-30, cy+20, false);
            drawHomolog(cx+45, cy+20, cx+70, cy+20, false);
        } else if (stage === 3) { // Telophase I
            ctx.fillStyle = "#fde68a66";
            ctx.beginPath();
            ctx.ellipse(cx-60, cy-15, 55, 50, 0, 0, 2*Math.PI);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx+60, cy-15, 55, 50, 0, 0, 2*Math.PI);
            ctx.fill();
            drawHomolog(cx-75, cy-18, cx-50, cy-18, false);
            drawHomolog(cx+45, cy-18, cx+70, cy-18, false);
        } else if (stage === 4) { // 4 gametes
            for (let gx of [-65, -25, 25, 65]) {
                ctx.fillStyle = "#a78bfa";
                ctx.fillRect(gx-6, cy-10, 7, 22);
                ctx.fillStyle = "#fbbf24";
                ctx.beginPath();
                ctx.arc(gx-2, cy, 3, 0, 2*Math.PI);
                ctx.fill();
            }
            ctx.fillStyle = "#78350f";
            ctx.font = "bold 13px 'Segoe UI'";
            ctx.fillText("4 unique haploid cells", cx-70, cy+50);
        }
    }
    
    // Build simulator HTML dynamically
    function buildSimulator() {
        const container = document.getElementById('simulatorContainer');
        const isMitosis = (currentMode === 'mitosis');
        const headerClass = isMitosis ? 'mitosis-header' : 'meiosis-header';
        const headerIcon = isMitosis ? '🌱 MITOSIS · Asexual Reproduction' : '🥚 MEIOSIS · Sexual Reproduction';
        
        container.innerHTML = `
            <div class="sim-card">
                <div class="sim-header ${headerClass}">${headerIcon}</div>
                <div class="canvas-wrapper">
                    <canvas id="activeCanvas" width="600" height="400" style="width:100%; max-width:600px; height:auto; background:#fffdf5; border-radius:20px"></canvas>
                </div>
                <div class="stage-controls">
                    <div class="stage-name" id="activeStageName">${isMitosis ? mitosisStages[0].name : meiosisStages[0].name}</div>
                    <div class="stage-desc" id="activeStageDesc">${isMitosis ? mitosisStages[0].desc : meiosisStages[0].desc}</div>
                    <div class="dot-indicator" id="activeDots"></div>
                    <div class="button-group">
                        <button class="ctrl-btn" id="prevBtn">◀ Previous</button>
                        <button class="ctrl-btn primary" id="nextBtn">Next ▶</button>
                        <button class="ctrl-btn" id="autoBtn">▶ Auto</button>
                    </div>
                </div>
            </div>
        `;
        
        // Get canvas reference
        const canvas = document.getElementById('activeCanvas');
        if (isMitosis) {
            mitosisCanvas = canvas;
            ctxM = canvas.getContext('2d');
            drawMitosis();
        } else {
            meiosisCanvas = canvas;
            ctxMe = canvas.getContext('2d');
            drawMeiosis();
        }
        
        // Attach event listeners
        document.getElementById('prevBtn').onclick = () => { if(isMitosis) prevMitosis(); else prevMeiosis(); };
        document.getElementById('nextBtn').onclick = () => { if(isMitosis) nextMitosis(); else nextMeiosis(); };
        document.getElementById('autoBtn').onclick = () => { if(isMitosis) toggleMitosisAuto(); else toggleMeiosisAuto(); };
        updateActiveUI();
    }
    
    function updateActiveUI() {
        const isMitosis = (currentMode === 'mitosis');
        const target = isMitosis ? mitosisTarget : meiosisTarget;
        const stages = isMitosis ? mitosisStages : meiosisStages;
        
        document.getElementById('activeStageName').innerHTML = stages[target].name;
        document.getElementById('activeStageDesc').innerHTML = stages[target].desc;
        
        const dotsDiv = document.getElementById('activeDots');
        dotsDiv.innerHTML = '';
        for (let i = 0; i < 5; i++) {
            let d = document.createElement('div');
            d.className = `dot ${i === target ? 'active' : ''}`;
            d.onclick = () => { if(isMitosis) setMitosisStage(i); else setMeiosisStage(i); };
            dotsDiv.appendChild(d);
        }
        
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        prevBtn.disabled = target === 0;
        nextBtn.disabled = target === 4;
        
        if (isMitosis) drawMitosis();
        else drawMeiosis();
    }
    
    // Mitosis control functions
    function setMitosisStage(stage) {
        if (mitosisAuto) stopMitosisAuto();
        mitosisTarget = stage;
        updateActiveUI();
    }
    function nextMitosis() { if (mitosisTarget < 4) setMitosisStage(mitosisTarget + 1); }
    function prevMitosis() { if (mitosisTarget > 0) setMitosisStage(mitosisTarget - 1); }
    function stopMitosisAuto() { if (mitosisInterval) clearInterval(mitosisInterval); mitosisAuto = false; if(document.getElementById('autoBtn')) document.getElementById('autoBtn').innerHTML = '▶ Auto'; }
    function toggleMitosisAuto() {
        if (mitosisAuto) { stopMitosisAuto(); }
        else {
            stopMitosisAuto();
            mitosisAuto = true;
            document.getElementById('autoBtn').innerHTML = '⏸ Pause';
            let step = mitosisTarget;
            mitosisInterval = setInterval(() => {
                if (step < 4) { step++; setMitosisStage(step); }
                else { stopMitosisAuto(); }
            }, 2200);
        }
    }
    
    // Meiosis control functions
    function setMeiosisStage(stage) {
        if (meiosisAuto) stopMeiosisAuto();
        meiosisTarget = stage;
        updateActiveUI();
    }
    function nextMeiosis() { if (meiosisTarget < 4) setMeiosisStage(meiosisTarget + 1); }
    function prevMeiosis() { if (meiosisTarget > 0) setMeiosisStage(meiosisTarget - 1); }
    function stopMeiosisAuto() { if (meiosisInterval) clearInterval(meiosisInterval); meiosisAuto = false; if(document.getElementById('autoBtn')) document.getElementById('autoBtn').innerHTML = '▶ Auto'; }
    function toggleMeiosisAuto() {
        if (meiosisAuto) { stopMeiosisAuto(); }
        else {
            stopMeiosisAuto();
            meiosisAuto = true;
            document.getElementById('autoBtn').innerHTML = '⏸ Pause';
            let step = meiosisTarget;
            meiosisInterval = setInterval(() => {
                if (step < 4) { step++; setMeiosisStage(step); }
                else { stopMeiosisAuto(); }
            }, 2500);
        }
    }
    
    // Mode switching
    document.getElementById('mitosisModeBtn').onclick = () => {
        if (currentMode === 'mitosis') return;
        currentMode = 'mitosis';
        document.getElementById('mitosisModeBtn').classList.remove('inactive');
        document.getElementById('meiosisModeBtn').classList.add('inactive');
        buildSimulator();
    };
    document.getElementById('meiosisModeBtn').onclick = () => {
        if (currentMode === 'meiosis') return;
        currentMode = 'meiosis';
        document.getElementById('meiosisModeBtn').classList.remove('inactive');
        document.getElementById('mitosisModeBtn').classList.add('inactive');
        buildSimulator();
    };
    
    // Animation loop
    function animate() {
        if (currentMode === 'mitosis' && mitosisCanvas && ctxM) drawMitosis();
        if (currentMode === 'meiosis' && meiosisCanvas && ctxMe) drawMeiosis();
        requestAnimationFrame(animate);
    }
    
    // Initialize
    buildSimulator();
    animate();
    
    // ============================================================
    // QUIZ (Updated Question 5 - homologous chromosomes)
    // ============================================================
    const QUESTIONS = [
        { text: "During mitosis in an animal cell, which event occurs in anaphase?", options: ["A. Chromosomes align at equator", "B. Sister chromatids separate", "C. Nuclear envelope reforms", "D. Homologous chromosomes pair"], correct: 1, explanation: "Anaphase: sister chromatids separate and move to opposite poles." },
        { text: "What is the key difference between meiosis I and mitosis?", options: ["A. DNA replicates once", "B. Homologous chromosomes separate", "C. Sister chromatids separate", "D. Spindle fibers form"], correct: 1, explanation: "Meiosis I separates homologous chromosomes, reducing chromosome number by half." },
        { text: "After mitosis of a human liver cell, each daughter cell has:", options: ["A. 23 chromosomes", "B. 46 chromosomes", "C. 92 chromosomes", "D. Variable number"], correct: 1, explanation: "Mitosis preserves chromosome number: 46 in humans." },
        { text: "During which phase of mitosis do chromosomes align at the metaphase plate?", options: ["A. Prophase", "B. Metaphase", "C. Anaphase", "D. Telophase"], correct: 1, explanation: "Metaphase: chromosomes line up at the equator for equal distribution." },
        { text: "What happens during Anaphase I of meiosis?", options: ["A. Sister chromatids separate", "B. Homologous chromosomes separate", "C. Chromosomes align at equator", "D. Nuclear envelope forms"], correct: 1, explanation: "Anaphase I: homologous chromosomes separate and move to opposite poles. Sister chromatids stay together." }
    ];
    
    let userAnswers = new Array(5).fill(null);
    let quizSubmitted = false;
    
    function renderQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        QUESTIONS.forEach((q, idx) => {
            const div = document.createElement('div');
            div.className = 'question-block';
            div.innerHTML = `<div class="q-text">${idx+1}. ${q.text}</div><div class="options" id="opts-${idx}"></div>`;
            container.appendChild(div);
            const optsDiv = div.querySelector(`.options`);
            q.options.forEach((opt, oidx) => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.innerHTML = `<input type="radio" name="q${idx}" value="${oidx}" id="q${idx}_${oidx}" ${userAnswers[idx]===oidx ? 'checked' : ''}><label for="q${idx}_${oidx}">${opt}</label>`;
                optDiv.querySelector('input').addEventListener('change', () => { userAnswers[idx] = oidx; });
                optsDiv.appendChild(optDiv);
            });
        });
    }
    
    async function sendEmail(name, cls, sid, score, details) {
        let summ = details.map(d => `Q${d.qNum}: ${d.studentAnswer} (correct: ${d.correctAnswer})\n${d.explanation}`).join('\n');
        const msg = `Student: ${name}\nClass: ${cls}\nID: ${sid}\nScore: ${score}/100\n\nDetailed Answers:\n${summ}`;
        const fd = new FormData();
        fd.append('access_key', 'f8697ff5-0b11-4d52-9d70-657a0028e31c');
        fd.append('email', 'ngtinghei0803@gmail.com');
        fd.append('subject', `Cell Division Quiz: ${name} - ${cls}`);
        fd.append('message', msg);
        try {
            await fetch('https://api.web3forms.com/submit', { method: 'POST', body: fd });
            alert(`✅ Report sent! Score: ${score}/100`);
        } catch(e) { alert(`⚠️ Score: ${score}/100 (email failed, but score recorded)`); }
    }
    
    function computeScore() {
        let score = 0, details = [];
        for (let i = 0; i < QUESTIONS.length; i++) {
            const correct = (userAnswers[i] === QUESTIONS[i].correct);
            if (correct) score += 20;
            details.push({
                qNum: i+1,
                studentAnswer: userAnswers[i] !== null ? QUESTIONS[i].options[userAnswers[i]] : 'Not answered',
                correctAnswer: QUESTIONS[i].options[QUESTIONS[i].correct],
                explanation: QUESTIONS[i].explanation
            });
        }
        return { score, details };
    }
    
    document.getElementById('submitBtn').onclick = async () => {
        if (quizSubmitted) { alert('Already submitted. Reset to retry.'); return; }
        const name = document.getElementById('studentName').value.trim();
        const cls = document.getElementById('classGroup').value.trim();
        const sid = document.getElementById('studentId').value.trim();
        if (!name || !cls || !sid) { alert('Please fill in all student information.'); return; }
        if (userAnswers.includes(null)) { alert('Please answer all 5 questions.'); return; }
        const { score, details } = computeScore();
        document.getElementById('scoreDisplay').style.display = 'block';
        document.getElementById('scoreDisplay').innerHTML = `📊 Your Score: ${score} / 100`;
        const expDiv = document.getElementById('aiExplanations');
        const listDiv = document.getElementById('explanationsList');
        listDiv.innerHTML = details.map(d => `<div><strong>Q${d.qNum}</strong>: Your: ${d.studentAnswer} | Correct: ${d.correctAnswer}<br>📖 ${d.explanation}</div>`).join('');
        expDiv.style.display = 'block';
        await sendEmail(name, cls, sid, score, details);
        quizSubmitted = true;
    };
    
    document.getElementById('resetQuizBtn').onclick = () => {
        userAnswers.fill(null);
        quizSubmitted = false;
        renderQuiz();
        document.getElementById('scoreDisplay').style.display = 'none';
        document.getElementById('aiExplanations').style.display = 'none';
    };
    
    renderQuiz();
</script>
</body>
</html>
