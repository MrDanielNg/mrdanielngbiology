                        { title: "前期 (Prophase)", label: "前期", desc: "1. 染色質濃縮成清晰可見的染色體。<br>2. 核膜逐漸消失。<br>3. 中心體向兩極移動並發出紡錘絲。" },

                    ]

                meiosis: {
                    theory: `<b>為什麼要進行減數分裂？</b><br>主要目的是產生用於有性生殖的配子（如精子和卵子）。透過使染色體數目減半（2n → n），確保受精後子代的染色體數目能維持恆定。<br><br><b>核心特點：</b><br>1. DNA複製1次，細胞連續分裂2次。<br>2. <b>減數第一次分裂：</b>同源染色體配對（聯會）並分離，這是數目減半的關鍵！<br>3. <b>減數第二次分裂：</b>姊妹染色單體分離，類似有絲分裂。`,

                    theory: `<b>Why Meiosis?</b><br>To produce haploid gametes (sperm/egg) for sexual reproduction. Reducing chromosomes by half (2n → n) ensures stable chromosome numbers across generations after fertilization.<br><br><b>Key Features:</b><br>1. DNA replicates once, cell divides twice.<br>2. <b>Meiosis I:</b> Homologous chromosomes pair up (synapsis) and separate. This halves the chromosome number!<br>3. <b>Meiosis II:</b> Sister chromatids separate, identical to a mitotic division.`,
                    stages: [
                        { title: "Meiosis I - Pro- & Metaphase", label: "Mei I Meta", desc: "<b>Homologous chromosomes pair up!</b> Maternal and paternal homologues form tetrads and align in pairs along the equator. Crossing-over occurs here to boost genetic diversity." },
                        { title: "Meiosis I - Ana- & Telophase", label: "Mei I Telo", desc: "<b>Homologous chromosomes separate!</b> Crucially, centromeres do NOT split yet; intact chromosomes move to poles. Cytoplasm divides into 2 haploid (n) cells containing duplicated DNA." },
                        { title: "Meiosis II - Pro- & Metaphase", label: "Mei II Meta", desc: "Without further DNA replication, both cells enter Meiosis II. Chromosomes align single-file at the equatorial plate of each respective cell." },
                        { title: "Meiosis II - Anaphase", label: "Mei II Ana", desc: "<b>Sister chromatids separate!</b> Centromeres finally split. Spindle fibers pull individual chromatids to opposite poles, much like standard mitosis." },
                        { title: "Meiosis II - Telophase (Result)", label: "4 Gametes", desc: "Cytoplasm divides once more, resulting in <b>4 genetically unique haploid (n) gametes</b> (e.g., sperm cells). This provides the bedrock of genetic variation!" }
                    ]
                }
            }
        };

        const quizQuestions = [
            {
                id: 1,
                zh: { q: "1. 減數分裂中，染色體數目在哪個階段真正減半？", a: "A. 減數第一次分裂結束後", b: "B. 減數第二次分裂結束後", c: "C. 間期 DNA 複製時" },
                en: { q: "1. In meiosis, when does the chromosome number actually get reduced by half?", a: "A. After Meiosis I ends", b: "B. After Meiosis II ends", c: "C. During DNA replication in Interphase" },
                correct: "A"
            },
            {
                id: 2,
                zh: { q: "2. 在有絲分裂的後期（Anaphase），被紡錘絲拉向細胞兩極的是什麼結構？", a: "A. 同源染色體", b: "B. 姊妹染色單體", c: "C. 四分體" },
                en: { q: "2. During Anaphase of Mitosis, what structures are pulled to opposite poles by spindle fibers?", a: "A. Homologous chromosomes", b: "B. Sister chromatids", c: "C. Tetrads" },
                correct: "B"
            },
            {
                id: 3,
                zh: { q: "3. 一個具有 46 條染色體的母細胞，經過「有絲分裂」與「減數分裂」後產生的子細胞，染色體數目分別為多少？", a: "A. 46, 46", b: "B. 23, 46", c: "C. 46, 23" },
                en: { q: "3. A parent cell has 46 chromosomes. What are the chromosome numbers in the daughter cells after Mitosis and Meiosis respectively?", a: "A. 46, 46", b: "B. 23, 46", c: "C. 46, 23" },
                correct: "C"
            },
            {
                id: 4,
                zh: { q: "4. 「同源染色體配對（聯會）並排成兩列」是下列哪種分裂特有的現象？", a: "A. 有絲分裂中期", b: "B. 減數第一次分裂中期", c: "C. 減數第二次分裂中期" },
                en: { q: "4. 'Homologous chromosomes pairing up and aligning in two rows' is unique to which stage?", a: "A. Mitosis Metaphase", b: "B. Meiosis I Metaphase", c: "C. Meiosis II Metaphase" },
                correct: "B"
            },
            {
                id: 5,
                zh: { q: "5. 有絲分裂最核心的生物學目的是什麼？", a: "A. 產生遺傳多樣性不同的配子", b: "B. 確保子細胞與母細胞擁有完全相同的遺傳物質", c: "C. 減少變異以利於有性生殖" },
                en: { q: "5. What is the primary biological purpose of Mitosis?", a: "A. To generate genetically diverse gametes", b: "B. To ensure daughter cells are genetically identical to the parent cell", c: "C. To reduce mutations for sexual reproduction" },
                correct: "B"
            }
        ];

        // 全局狀態
        let currentLang = 'zh';
        let currentMode = 'mitosis'; // 'mitosis' 或 'meiosis'
        let currentStep = 0;
        let targetStep = 0;
        let transitionProgress = 0;
        const animationSpeed = 0.025;
        let isAutoPlaying = false;
        let animationId;

        // Canvas 初始化
        const canvas = document.getElementById('splitCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const parent = canvas.parentElement;
            canvas.width = parent.clientWidth;
            canvas.height = parent.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 染色體預設數據 (4條)
        const chromosomes = [
            { color: '#4f46e5', angle: 30, size: 20, offsetX: -25, offsetY: -25 },
            { color: '#db2777', angle: -20, size: 22, offsetX: 25, offsetY: -20 },
            { color: '#10b981', angle: 15, size: 18, offsetX: -20, offsetY: 25 },
            { color: '#f59e0b', angle: -40, size: 24, offsetX: 20, offsetY: 20 }
        ];

        // 工具函數
        function lerp(start, end, t) { return start * (1 - t) + end * t; }

        /**
         * Canvas 渲染核心：完美呈現 Mitosis 與 Meiosis 的形態差異
         */
        function drawSimulation() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const r = Math.min(canvas.width, canvas.height) * 0.32;

            // 根據步驟與模式計算物理狀態參數
            let cellPinch = 0; // 0=圓形, 1=極度凹陷
            let cellCount = 1; // 畫布內的主細胞群數量
            let drawSpindles = false;
            let spindleProgress = 0;
            let chromState = "loose"; // loose, single-file, double-file, separating, four-cells

            if (currentMode === 'mitosis') {
                if (currentStep === 0) { chromState = "loose"; }
                else if (currentStep === 1) { chromState = "condensing"; drawSpindles = true; spindleProgress = transitionProgress; }
                else if (currentStep === 2) { chromState = "single-file"; drawSpindles = true; spindleProgress = 1; }
                else if (currentStep === 3) { chromState = "separating-mitosis"; drawSpindles = true; spindleProgress = 1; cellPinch = lerp(0.1, 0.4, transitionProgress); }
                else if (currentStep === 4) { chromState = "two-cells-mitosis"; cellPinch = 1; }
            } else { // meiosis
                if (currentStep === 0) { chromState = "double-file"; drawSpindles = true; }
                else if (currentStep === 1) { chromState = "separating-meiosis I"; drawSpindles = true; cellPinch = transitionProgress * 0.5; }
                else if (currentStep === 2) { chromState = "meiosis II-align"; cellCount = 2; drawSpindles = true; }
                else if (currentStep === 3) { chromState = "meiosis II-separating"; cellCount = 2; cellPinch = transitionProgress * 0.6; drawSpindles = true; }
                else if (currentStep === 4) { chromState = "four-cells"; }
            }

            // 1. 繪製細胞外膜胞質
            ctx.fillStyle = '#f0f9ff';
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 4;

            if (chromState === "four-cells") {
                // 減數分裂最終生成 4 個獨立小細胞
                const positions = [{x: cx-70, y: cy-60}, {x: cx+70, y: cy-60}, {x: cx-70, y: cy+60}, {x: cx+70, y: cy+60}];
                positions.forEach(p => {
                    ctx.beginPath(); ctx.arc(p.x, p.y, r*0.5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    // 畫微弱核膜
                    ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1.5; ctx.setLineDash([4,3]);
                    ctx.beginPath(); ctx.arc(p.x, p.y, r*0.3, 0, Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
                });
            } else if (cellCount === 2) {
                // 減數分裂 II 的雙細胞並列狀態
                [-80, 80].forEach(offset => {
                    ctx.save(); ctx.translate(offset, 0);
                    if (chromState === "meiosis II-separating") {
                        // 各自拉長凹陷
                        ctx.beginPath(); ctx.ellipse(cx, cy, r*0.6 + (cellPinch*20), r*0.5 - (cellPinch*10), 0, 0, Math.PI*2);
                    } else {
                        ctx.beginPath(); ctx.arc(cx, cy, r * 0.55, 0, Math.PI*2);
                    }
                    ctx.fill(); ctx.stroke(); ctx.restore();
                });
            } else {
                // 有絲分裂或減數第一階段：單細胞或分裂中
                ctx.beginPath();
                if (cellPinch > 0.6) { // 徹底切開成兩半
                    ctx.arc(cx - r*0.7, cy, r*0.7, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.arc(cx + r*0.7, cy, r*0.7, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                } else {
                    const elongation = cellPinch * 60;
                    ctx.ellipse(cx, cy, r + elongation, r - cellPinch*25, 0, 0, Math.PI*2);
                    ctx.fill(); ctx.stroke();
                }
            }

            // 2. 繪製紡錘絲與中心體
            if (drawSpindles && chromState !== "four-cells") {
                ctx.save(); ctx.globalAlpha = 0.3; ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 1.5;
                if (cellCount === 1) {
                    ctx.beginPath();
                    for(let i=-50; i<=50; i+=15) {
                        ctx.moveTo(cx - r, cy); ctx.quadraticCurveTo(cx, cy+i, cx + r, cy);
                    }
                    ctx.stroke();
                } else {
                    [-80, 80].forEach(offset => {
                        ctx.beginPath();
                        for(let i=-30; i<=30; i+=10) {
                            ctx.moveTo(cx + offset - r*0.5, cy); ctx.quadraticCurveTo(cx+offset, cy+i, cx + offset + r*0.5, cy);
                        }
                        ctx.stroke();
                    });
                }
                ctx.restore();
            }

            // 3. 繪製染色體動態形態
            chromosomes.forEach((c, idx) => {
                ctx.save();
                ctx.fillStyle = c.color;

                if (chromState === "loose") {
                    // 亂序微弱分散狀態 (間期)
                    ctx.globalAlpha = 0.4;
                    ctx.beginPath(); ctx.arc(cx + c.offsetX, cy + c.offsetY, 8, 0, Math.PI*2); ctx.fill();
                } 
                else if (chromState === "condensing") {
                    // 開始凝縮，朝中央移動
                    const tx = lerp(cx + c.offsetX, cx, transitionProgress);
                    const ty = lerp(cy + c.offsetY, cy - 40 + idx*25, transitionProgress);
                    drawX(tx, ty, 14);
                }
                else if (chromState === "single-file") {
                    // 有絲分裂：赤道板排成單列一條線
                    drawX(cx, cy - 45 + idx * 30, 16);
                }
                else if (chromState === "separating-mitosis") {
                    // 有絲分裂後期：姊妹染色單體 V 字形分離拉開
                    const dist = cellPinch * 90;
                    drawV(cx - dist, cy - 45 + idx*30, 12, true);
                    drawV(cx + dist, cy - 45 + idx*30, 12, false);
                }
                else if (chromState === "two-cells-mitosis") {
                    // 有絲分裂末期：兩邊各自得到 4 條單體，準備解聚
                    drawV(cx - r*0.7 + c.offsetX*0.3, cy + c.offsetY*0.3, 10, true);
                    drawV(cx + r*0.7 + c.offsetX*0.3, cy + c.offsetY*0.3, 10, false);
                }
                else if (chromState === "double-file") {
                    // 減數分裂 I 中期：同源染色體成對排成「雙列」
                    // 0,2 排左列；1,3 排右列
                    const sideX = (idx % 2 === 0) ? cx - 20 : cx + 20;
                    const rowY = cy - 30 + Math.floor(idx/2) * 45;
                    drawX(sideX, rowY, 16);
                }
                else if (chromState === "separating-meiosis I") {
                    // 減數分裂 I 後期：整條完整的 X 染色體被分離拉向兩極！
                    const dist = cellPinch * 80;
                    const sideX = (idx % 2 === 0) ? cx - 20 - dist : cx + 20 + dist;
                    const rowY = cy - 30 + Math.floor(idx/2) * 45;
                    drawX(sideX, rowY, 15);
                }
                else if (chromState === "meiosis II-align") {
                    // 減數分裂 II：兩個子細胞中各有 2 條染色體單列排列
                    const cellX = (idx % 2 === 0) ? cx - 80 : cx + 80;
                    const rowY = cy - 20 + Math.floor(idx/2) * 40;
                    drawX(cellX, rowY, 14);
                }
                else if (chromState === "meiosis II-separating") {
                    // 減數分裂 II 後期：第二次分裂，著絲點裂開，單體分離
                    const cellCenterX = (idx % 2 === 0) ? cx - 80 : cx + 80;
                    const dist = cellPinch * 40;
                    const rowY = cy - 20 + Math.floor(idx/2) * 40;
                    drawV(cellCenterX - dist, rowY, 10, true);
                    drawV(cellCenterX + dist, rowY, 10, false);
                }
                else if (chromState === "four-cells") {
                    // 最終成果：四個各含單條單體染色體的單倍體精卵細胞
                    const positions = [
                        {x: cx-70, y: cy-60}, {x: cx+70, y: cy-60}, 
                        {x: cx-70, y: cy+60}, {x: cx+70, y: cy+60}
                    ];
                    const p = positions[idx];
                    drawV(p.x, p.y, 9, idx % 2 === 0);
                }
                ctx.restore();
            });
        }

        // 輔助繪製 X 形複製染色體
        function drawX(x, y, size) {
            ctx.lineWidth = 3.5; ctx.lineCap = "round"; ctx.strokeStyle = ctx.fillStyle;
            ctx.beginPath(); ctx.moveTo(x - size/2, y - size/2); ctx.lineTo(x + size/2, y + size/2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x + size/2, y - size/2); ctx.lineTo(x - size/2, y + size/2); ctx.stroke();
            // 畫著絲點
            ctx.fillStyle = '#fcd34d'; ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI*2); ctx.fill();
        }

        // 輔助繪製 V 形單條染色單體
        function drawV(x, y, size, toLeft) {
            ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.strokeStyle = ctx.fillStyle;
            ctx.beginPath();
            if (toLeft) {
                ctx.moveTo(x + size/2, y - size/2); ctx.lineTo(x, y); ctx.lineTo(x + size/2, y + size/2);
            } else {
                ctx.moveTo(x - size/2, y - size/2); ctx.lineTo(x, y); ctx.lineTo(x - size/2, y + size/2);
            }
            ctx.stroke();
        }

        /**
         * 動畫主循環
         */
        function animate() {
            if (currentStep !== targetStep) {
                transitionProgress += animationSpeed;
                if (transitionProgress >= 1) {
                    transitionProgress = 0;
                    currentStep = targetStep;
                    updateUI();
                    if (isAutoPlaying) {
                        setTimeout(() => {
                            if (currentStep < 4) goToStep(currentStep + 1);
                            else { isAutoPlaying = false; syncControlButtons(); }
                        }, 1200);
                    }
                }
            }
            drawSimulation();
            animationId = requestAnimationFrame(animate);
        }

        /**
         * UI 連動切換與渲染
         */
        const stageTitle = document.getElementById('stageTitle');
        const stageDesc = document.getElementById('stageDescription');
        const stageLabel = document.getElementById('stageLabel');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const autoPlayBtn = document.getElementById('autoPlayBtn');
        const dotsContainer = document.getElementById('dotsContainer');

        function initProgressDots() {
            dotsContainer.innerHTML = '';
            for(let i=0; i<5; i++) {
                const dot = document.createElement('div');
                dot.className = "w-2.5 h-2.5 rounded-full bg-slate-300 transition-all duration-300";
                dotsContainer.appendChild(dot);
            }
        }

        function updateUI() {
            const t = i18nData[currentLang][currentMode];
            const info = t.stages[targetStep];
            
            stageTitle.textContent = info.title;
            stageLabel.textContent = info.label;
            stageDesc.innerHTML = info.desc;
            
            prevBtn.disabled = targetStep === 0;
            nextBtn.disabled = targetStep === 4;

            // 更新指示圓點
            Array.from(dotsContainer.children).forEach((dot, idx) => {
                if (idx <= targetStep) {
                    dot.classList.remove('bg-slate-300');
                    dot.classList.add('bg-indigo-600', 'scale-110');
                } else {
                    dot.classList.remove('bg-indigo-600', 'scale-110');
                    dot.classList.add('bg-slate-300');
                }
            });
            syncControlButtons();
        }

        function syncControlButtons() {
            const t = i18nData[currentLang];
            document.querySelector('#autoPlayBtn span').innerText = isAutoPlaying ? t.autoPlayRunning : t.autoPlay;
        }

        function goToStep(step) {
            if (step < 0 || step > 4) return;
            if (currentStep !== targetStep) { currentStep = targetStep; transitionProgress = 0; }
            targetStep = step;
            updateUI();
        }

        // 綁定控制按鈕
        nextBtn.addEventListener('click', () => { isAutoPlaying = false; goToStep(targetStep + 1); });
        prevBtn.addEventListener('click', () => { isAutoPlaying = false; targetStep = Math.max(0, targetStep - 1); currentStep = targetStep; transitionProgress = 0; updateUI(); });
        document.getElementById('resetBtn').addEventListener('click', () => { isAutoPlaying = false; targetStep = 0; currentStep = 0; transitionProgress = 0; updateUI(); });
        
        autoPlayBtn.addEventListener('click', () => {
            if (isAutoPlaying) { isAutoPlaying = false; } 
            else {
                if (targetStep === 4) { targetStep = 0; currentStep = 0; }
                isAutoPlaying = true;
                if (currentStep === targetStep && targetStep < 4) goToStep(targetStep + 1);
            }
            syncControlButtons();
        });

        // 模式切換邏輯
        const mitosisModeBtn = document.getElementById('mitosisModeBtn');
        const meiosisModeBtn = document.getElementById('meiosisModeBtn');

        function switchMode(mode) {
            currentMode = mode;
            isAutoPlaying = false;
            currentStep = 0; targetStep = 0; transitionProgress = 0;
            
            if (mode === 'mitosis') {
                mitosisModeBtn.className = "px-3 py-1.5 rounded-lg text-xs md:text-sm font-bold transition-all bg-indigo-600 text-white shadow-sm";
                meiosisModeBtn.className = "px-3 py-1.5 rounded-lg text-xs md:text-sm font-bold transition-all text-slate-600 hover:text-slate-900";
            } else {
                meiosisModeBtn.className = "px-3 py-1.5 rounded-lg text-xs md:text-sm font-bold transition-all bg-indigo-600 text-white shadow-sm";
                mitosisModeBtn.className = "px-3 py-1.5 rounded-lg text-xs md:text-sm font-bold transition-all text-slate-600 hover:text-slate-900";
            }
            updateUI();
        }
        mitosisModeBtn.addEventListener('click', () => switchMode('mitosis'));
        meiosisModeBtn.addEventListener('click', () => switchMode('meiosis'));

        /**
         * 5 題互動問答挑戰邏輯區
         */
        const quizContainer = document.getElementById('quizContainer');
        function renderQuiz() {
            quizContainer.innerHTML = '';
            quizQuestions.forEach((q, idx) => {
                const data = q[currentLang];
                const block = document.createElement('div');
                block.className = "p-4 rounded-xl border border-slate-100 bg-slate-50/50 space-y-2.5";
                block.innerHTML = `
                    <p class="font-bold text-slate-800 text-sm md:text-base">${data.q}</p>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-2 text-xs md:text-sm">
                        <label class="flex items-center gap-2 p-2 bg-white rounded-lg border hover:bg-slate-50 cursor-pointer transition">
                            <input type="radio" name="question-${q.id}" value="A" class="accent-indigo-600"> <span>${data.a}</span>
                        </label>
                        <label class="flex items-center gap-2 p-2 bg-white rounded-lg border hover:bg-slate-50 cursor-pointer transition">
                            <input type="radio" name="question-${q.id}" value="B" class="accent-indigo-600"> <span>${data.b}</span>
                        </label>
                        <label class="flex items-center gap-2 p-2 bg-white rounded-lg border hover:bg-slate-50 cursor-pointer transition">
                            <input type="radio" name="question-${q.id}" value="C" class="accent-indigo-600"> <span>${data.c}</span>
                        </label>
                    </div>
                    <div id="feedback-${q.id}" class="text-xs font-bold hidden pt-1"></div>
                `;
                quizContainer.appendChild(block);
            });
            document.getElementById('quizScore').classList.add('hidden');
        }

        document.getElementById('submitQuizBtn').addEventListener('click', () => {
            let score = 0;
            quizQuestions.forEach(q => {
                const selected = document.querySelector(`input[name="question-${q.id}"]:checked`);
                const feedback = document.getElementById(`feedback-${q.id}`);
                feedback.classList.remove('hidden', 'text-emerald-600', 'text-red-500');
                
                if (selected) {
                    if (selected.value === q.correct) {
                        score++;
                        feedback.innerText = currentLang === 'zh' ? "✓ 正確！" : "✓ Correct!";
                        feedback.classList.add('text-emerald-600');
                    } else {
                        feedback.innerText = currentLang === 'zh' ? `✗ 錯誤，正確答案是 ${q.correct}` : `✗ Wrong, correct answer is ${q.correct}`;
                        feedback.classList.add('text-red-500');
                    }
                } else {
                    feedback.innerText = currentLang === 'zh' ? `！未作答，正確答案是 ${q.correct}` : `! Unanswered, correct answer is ${q.correct}`;
                    feedback.classList.add('text-amber-500');
                }
            });

            const scoreDisplay = document.getElementById('quizScore');
            scoreDisplay.classList.remove('hidden');
            scoreDisplay.innerText = currentLang === 'zh' ? `得分：${score} / 5` : `Score: ${score} / 5`;
        });

        /**
         * 語言切換全局靜態文本更新
         */
        function updateAllPageTexts() {
            const t = i18nData[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.innerText = t[key];
            });
            updateUI();
            renderQuiz();
        }

        document.getElementById('langToggleBtn').addEventListener('click', () => {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            updateAllPageTexts();
        });

        // Modal 視窗彈出控制邏輯
        function toggleModal(id, show) {
            const m = document.getElementById(id);
            if (show) {
                m.classList.remove('hidden');
                if(id === 'theoryModal') {
                    document.getElementById('modalTheoryTitle').innerText = i18nData[currentLang].theoryBtn;
                    document.getElementById('theoryModalContent').innerHTML = i18nData[currentLang][currentMode].theory;
                }
            } else { m.classList.add('hidden'); }
        }

        document.getElementById('theoryBtn').addEventListener('click', () => toggleModal('theoryModal', true));
        document.getElementById('closeTheoryBtn').addEventListener('click', () => toggleModal('theoryModal', false));
        document.getElementById('moreInfoBtn').addEventListener('click', () => toggleModal('infoModal', true));
        document.getElementById('closeModalBtn').addEventListener('click', () => toggleModal('infoModal', false));

        // 頁面初始化
        initProgressDots();
        updateAllPageTexts();
        animate();
    </script>
</body>
</html>
