<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cell Division Lab | Mr. Daniel Ng Biology</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #10b981;
            --dark: #0f172a;
            --accent: #34d399;
            --bg-light: #f8fafc;
            --text-slate: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark);
            color: white;
            line-height: 1.6;
        }

        /* Navigation - Matching Index Page */
        nav { 
            padding: 20px 50px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(10px);
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo a { 
            font-size: 1.5rem; 
            font-weight: 800; 
            color: var(--primary); 
            text-decoration: none;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            background: white;
            color: var(--dark);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 2rem; border-left: 6px solid var(--primary); padding-left: 20px; margin-bottom: 10px; }
        .sub { color: var(--text-slate); margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; font-weight: 500; }

        /* Tabs */
        .tab-container { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; }
        .tab-btn {
            padding: 12px 25px;
            border-radius: 50px;
            border: none;
            background: #e2e8f0;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
        }
        .tab-btn.active { background: var(--primary); color: white; }

        /* Simulator Styles */
        .sim-box { display: none; text-align: center; }
        .sim-box.active { display: block; }
        
        .viewport {
            width: 100%;
            height: 350px;
            background: var(--bg-light);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            border: 2px solid #e2e8f0;
            margin-bottom: 20px;
            display: flex; justify-content: center; align-items: center;
        }

        .cell {
            width: 120px; height: 120px;
            border: 3px solid var(--dark);
            border-radius: 50%;
            position: absolute;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dna {
            width: 10px; height: 30px;
            border-radius: 5px;
            position: absolute;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .controls { margin-bottom: 40px; }
        .btn-main {
            background: var(--primary);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
        }

        /* Quiz Styles */
        .quiz-section { margin-top: 60px; padding-top: 40px; border-top: 4px dashed #e2e8f0; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; background: #f1f5f9; padding: 25px; border-radius: 24px; margin-bottom: 30px; }
        .input-group label { display: block; font-weight: 700; font-size: 0.8rem; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #cbd5e1; outline: none; }

        .question-block { background: #fdfcf7; border: 1px solid #e2e8f0; padding: 25px; border-radius: 24px; margin-bottom: 25px; }
        .q-tag { background: #e2e8f0; padding: 4px 12px; border-radius: 40px; font-size: 0.8rem; font-weight: 800; margin-bottom: 15px; display: inline-block; }
        .option { display: flex; align-items: center; gap: 12px; padding: 12px 18px; background: white; border: 1px solid #cbd5e1; border-radius: 50px; margin-top: 10px; cursor: pointer; }
        .option:hover { border-color: var(--primary); }

        .score-box { background: #d1fae5; color: #065f46; padding: 20px; border-radius: 24px; text-align: center; font-weight: 800; font-size: 1.4rem; margin: 20px 0; display: none; }
        .explanation-box { background: #fef3c7; border: 1px solid #fde68a; padding: 25px; border-radius: 24px; display: none; }

        footer { text-align: center; padding: 40px; color: #94a3b8; font-size: 0.8rem; }
    </style>
</head>
<body>

<nav>
    <div class="logo"><a href="index.html">🔬 MR. DANIEL NG</a></div>
</nav>

<div class="container">
    <h1>Cell Division Lab</h1>
    <p class="sub">HKDSE Biology | Virtual Modeling & Assessment</p>

    <div class="tab-container">
        <button id="tab-mitosis" class="tab-btn active" onclick="setTab('mitosis')">Mitosis</button>
        <button id="tab-meiosis" class="tab-btn" onclick="setTab('meiosis')">Meiosis</button>
    </div>

    <div id="sim-mitosis" class="sim-box active">
        <h3 id="m-label" style="margin-bottom:10px;">Interphase</h3>
        <div class="viewport" id="m-view">
            <div id="m-cell" class="cell"></div>
            <div id="m-dna1" class="dna" style="background:#ec4899; top:40%; left:46%;"></div>
            <div id="m-dna2" class="dna" style="background:#ec4899; top:52%; left:50%;"></div>
        </div>
        <div class="controls">
            <button class="btn-main" onclick="nextMitosis()">Next Stage →</button>
        </div>
    </div>

    <div id="sim-meiosis" class="sim-box">
        <h3 id="me-label" style="margin-bottom:10px;">Interphase</h3>
        <div class="viewport" id="me-view">
            <div id="me-cell" class="cell"></div>
            <div id="me-dna1" class="dna" style="background:#f97316; top:40%; left:46%;"></div>
            <div id="me-dna2" class="dna" style="background:#3b82f6; top:52%; left:50%;"></div>
        </div>
        <div class="controls">
            <button class="btn-main" onclick="nextMeiosis()">Next Stage →</button>
        </div>
    </div>

    <div class="quiz-section">
        <h2>🔬 Knowledge Assessment</h2>
        <p style="margin-bottom: 20px; color: var(--text-slate);">Complete the quiz below to verify your understanding. Results will be sent to Mr. Ng.</p>
        
        <div class="info-grid">
            <div class="input-group"><label>Student Name</label><input type="text" id="stuName" placeholder="Full Name"></div>
            <div class="input-group"><label>Class</label><input type="text" id="stuClass" placeholder="e.g. 5A"></div>
            <div class="input-group"><label>Number</label><input type="text" id="stuNo" placeholder="e.g. 12"></div>
        </div>

        <div id="quiz-container"></div>

        <div style="display:flex; gap:15px; margin-top:30px;">
            <button class="btn-main" id="submitBtn">✅ Submit Report</button>
            <button class="btn-main" style="background:#64748b;" onclick="location.reload()">🔄 Reset Lab</button>
        </div>

        <div id="scoreDisplay" class="score-box"></div>
        <div id="explanationDisplay" class="explanation-box">
            <h3 style="color:#b45309; margin-bottom:15px;">🤖 AI Feedback & Explanations</h3>
            <div id="exp-list"></div>
        </div>
    </div>
</div>

<footer>
    &copy; 2026 Mr. Daniel Ng Biology. All rights reserved.
</footer>

<script>
    /* --- SIMULATOR LOGIC --- */
    function setTab(type) {
        document.querySelectorAll('.sim-box').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        if(type === 'mitosis') {
            document.getElementById('sim-mitosis').classList.add('active');
            document.getElementById('tab-mitosis').classList.add('active');
        } else {
            document.getElementById('sim-meiosis').classList.add('active');
            document.getElementById('tab-meiosis').classList.add('active');
        }
    }

    let mStage = 0;
    function nextMitosis() {
        mStage++;
        const label = document.getElementById('m-label');
        const d1 = document.getElementById('m-dna1');
        const d2 = document.getElementById('m-dna2');
        const cell = document.getElementById('m-cell');

        if(mStage === 1) {
            label.innerText = "Metaphase: Chromosomes align at equator";
            d1.style.top = "45%"; d1.style.left = "40%"; d1.style.transform = "rotate(90deg)";
            d2.style.top = "45%"; d2.style.left = "55%"; d2.style.transform = "rotate(90deg)";
        } else if(mStage === 2) {
            label.innerText = "Anaphase: Sister chromatids separate";
            d1.style.top = "10%"; d2.style.top = "80%";
        } else if(mStage === 3) {
            label.innerText = "Cytokinesis: Two identical daughter cells";
            cell.style.width = "80px"; cell.style.top = "10%";
            let cell2 = cell.cloneNode(true); cell2.style.top = "65%";
            document.getElementById('m-view').appendChild(cell2);
        } else { location.reload(); }
    }

    let meStage = 0;
    function nextMeiosis() {
        meStage++;
        const label = document.getElementById('me-label');
        const d1 = document.getElementById('me-dna1');
        const d2 = document.getElementById('me-dna2');

        if(meStage === 1) {
            label.innerText = "Meiosis I: Homologous chromosomes separate";
            d1.style.top = "15%"; d2.style.top = "75%";
        } else if(meStage === 2) {
            label.innerText = "Meiosis II: Second division (Haploid)";
            d1.style.left = "20%"; d2.style.left = "75%";
        } else if(meStage === 3) {
            alert("Meiosis Complete: 4 Unique Haploid Cells Produced.");
            location.reload();
        }
    }

    /* --- QUIZ LOGIC --- */
    const QUESTIONS = [
        {
            q: "In which stage of mitosis do sister chromatids move to opposite poles?",
            opts: ["Prophase", "Metaphase", "Anaphase", "Telophase"],
            ans: 2,
            exp: "Anaphase is characterized by the separation of sister chromatids."
        },
        {
            q: "What is the result of Meiosis I?",
            opts: ["Two diploid cells", "Two haploid cells", "Four haploid cells", "Four diploid cells"],
            ans: 1,
            exp: "Meiosis I reduces the chromosome number by half, producing two haploid cells."
        },
        {
            q: "Regarding DSE Biology: Why is meiosis important in the life cycle of humans?",
            opts: ["Growth and repair", "Asexual reproduction", "Maintaining chromosome number across generations", "Increasing cell size"],
            ans: 2,
            exp: "Meiosis ensures that gametes have half the DNA so fertilization restores the diploid number."
        }
    ];

    let userAnswers = new Array(QUESTIONS.length).fill(null);
    const qContainer = document.getElementById('quiz-container');

    function loadQuiz() {
        QUESTIONS.forEach((item, idx) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question-block';
            qDiv.innerHTML = `<span class="q-tag">Question ${idx+1}</span><p style="font-weight:700; margin-bottom:15px;">${item.q}</p>`;
            item.opts.forEach((opt, oIdx) => {
                const label = document.createElement('label');
                label.className = 'option';
                label.innerHTML = `<input type="radio" name="q${idx}" onchange="userAnswers[${idx}]=${oIdx}"> ${opt}`;
                qDiv.appendChild(label);
            });
            qContainer.appendChild(qDiv);
        });
    }

    document.getElementById('submitBtn').addEventListener('click', async () => {
        const name = document.getElementById('stuName').value;
        const cls = document.getElementById('stuClass').value;
        const num = document.getElementById('stuNo').value;

        if(!name || !cls || !num) return alert("Please complete student information.");
        if(userAnswers.includes(null)) return alert("Please answer all questions.");

        let score = 0;
        let expHtml = '';
        QUESTIONS.forEach((item, i) => {
            const correct = userAnswers[i] === item.ans;
            if(correct) score += Math.floor(100/QUESTIONS.length);
            expHtml += `<div style="margin-bottom:15px; border-bottom:1px dashed #fcd34d; padding-bottom:10px;">
                <strong>Q${i+1}: ${correct ? '✅' : '❌'}</strong><br>
                <small>${item.exp}</small>
            </div>`;
        });

        document.getElementById('scoreDisplay').style.display = 'block';
        document.getElementById('scoreDisplay').innerText = `Total Score: ${score}/100`;
        document.getElementById('explanationDisplay').style.display = 'block';
        document.getElementById('exp-list').innerHTML = expHtml;

        // Email Submission via Web3Forms
        const report = `Student: ${name} (${cls} - ${num})\nScore: ${score}/100\nAnswers: ${userAnswers.join(', ')}`;
        const formData = new FormData();
        formData.append('access_key', 'f8697ff5-0b11-4d52-9d70-657a0028e31c');
        formData.append('subject', `Cell Lab: ${name} - ${cls}`);
        formData.append('message', report);

        try {
            await fetch('https://api.web3forms.com/submit', { method: 'POST', body: formData });
            alert("Report sent to Mr. Ng successfully!");
        } catch(e) {
            alert("Error sending report. Please screenshot your score.");
        }
    });

    loadQuiz();
</script>

</body>
</html>
