<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cell Division Simulator & Quiz | Mr. Daniel Ng Biology</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;800&family=Roboto:wght@400;700&display=swap');
        
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', 'Noto Sans TC', sans-serif; background-color: #0f172a; color: #1e293b; margin: 0; padding: 20px; }
        .app-container { max-width: 1100px; margin: 0 auto; background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        
        /* Navigation & Tabs */
        .nav-header { background: #1e293b; padding: 20px 30px; color: white; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .title-area { font-size: 1.25rem; font-weight: bold; color: #34d399; text-decoration: none; transition: 0.2s; }
        .title-area:hover { color: #10b981; }
        .controls-top { display: flex; gap: 10px; align-items: center; }
        .tab-btn { padding: 8px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; background: #334155; color: #cbd5e1; border: none; font-family: inherit; }
        .tab-btn.active { background: #10b981; color: white; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4); }
        .lang-btn { background: #f59e0b; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .lang-btn:hover { background: #d97706; }
        
        /* Simulator Layout */
        .sim-grid { display: grid; grid-template-columns: 3fr 2fr; border-bottom: 2px solid #e2e8f0; min-height: 400px; }
        .canvas-container { background: #0f172a; position: relative; border-right: 2px solid #e2e8f0; display: flex; align-items: center; justify-content: center; }
        canvas { width: 100%; height: 100%; max-height: 500px; display: block; }
        
        .controls-panel { padding: 30px; display: flex; flex-direction: column; background: white; }
        .stage-title { font-size: 1.5rem; font-weight: 800; color: #0f172a; margin-bottom: 10px; border-left: 5px solid #10b981; padding-left: 15px; margin-top: 0; }
        .stage-desc { font-size: 0.95rem; color: #475569; line-height: 1.6; flex-grow: 1; overflow-y: auto; padding-right: 10px; }
        
        .progress-dots { display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0; }
        .dot { height: 12px; width: 12px; background: #cbd5e1; border-radius: 50%; transition: 0.3s; cursor: pointer; }
        .dot.active { background: #10b981; transform: scale(1.3); }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto; }
        .ctrl-btn { padding: 12px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn-prev { background: #e2e8f0; color: #475569; }
        .btn-prev:hover:not(:disabled) { background: #cbd5e1; }
        .btn-next { background: #3b82f6; color: white; }
        .btn-next:hover:not(:disabled) { background: #2563eb; }
        .ctrl-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Quiz Section */
        .quiz-section { padding: 40px; background: #fdfcf7; }
        .quiz-header { font-size: 1.8rem; font-weight: 800; color: #0f172a; margin: 0 0 30px 0; text-align: center; }
        
        .info-card { background: #f1f5f9; border-radius: 20px; padding: 20px; display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; }
        .input-group { flex: 1 1 200px; display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-weight: bold; font-size: 0.85rem; color: #334155; }
        .input-group input { padding: 10px 15px; border-radius: 10px; border: 1px solid #cbd5e1; font-size: 1rem; }
        
        .q-block { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: all 0.3s ease; }
        .q-block:hover { box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .q-text { font-size: 1.1rem; font-weight: 700; margin-bottom: 15px; color: #1e293b; }
        .option-label { display: flex; align-items: flex-start; gap: 10px; padding: 12px 15px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 10px; cursor: pointer; transition: 0.2s; background: #f8fafc; }
        .option-label:hover { border-color: #10b981; background: white; transform: translateX(5px); }
        .option-label input { margin-top: 5px; accent-color: #10b981; width: 16px; height: 16px; }
        
        .submit-btn { background: #10b981; color: white; border: none; padding: 16px 40px; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; display: block; margin: 30px auto; transition: 0.3s; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }
        .submit-btn:hover:not(:disabled) { background: #059669; transform: translateY(-2px); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        /* Reset button */
        .reset-btn { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; margin-left: 10px; transition: 0.2s; }
        .reset-btn:hover { background: #dc2626; }

        /* Multilingual Utility */
        .lang-zh { display: none; }
        body[data-lang="zh"] .lang-en { display: none; }
        body[data-lang="zh"] .lang-zh { display: inline-block; }
        body[data-lang="zh"] div.lang-zh, body[data-lang="zh"] p.lang-zh { display: block; }

        @media (max-width: 768px) {
            .sim-grid { grid-template-columns: 1fr; }
            .canvas-container { min-height: 350px; }
            .nav-header { flex-direction: column; align-items: flex-start; }
            .controls-top { flex-wrap: wrap; }
            .quiz-section { padding: 20px; }
        }
    </style>
</head>
<body data-lang="en">

<div class="app-container">
    <header class="nav-header">
        <a href="https://mrdanielng.github.io/mrdanielngbiology/" class="title-area">🔬 Mr. Daniel Ng Biology</a>
        <div class="controls-top">
            <button id="tab-mitosis" class="tab-btn active" onclick="switchMode('mitosis')">
                <span class="lang-en">Mitosis</span><span class="lang-zh">有絲分裂</span>
            </button>
            <button id="tab-meiosis" class="tab-btn" onclick="switchMode('meiosis')">
                <span class="lang-en">Meiosis</span><span class="lang-zh">減數分裂</span>
            </button>
            <button class="lang-btn" onclick="toggleLanguage()">English / 中文</button>
            <button class="reset-btn" onclick="resetQuiz()">
                <span class="lang-en">Reset Quiz</span>
                <span class="lang-zh">重置測驗</span>
            </button>
        </div>
    </header>

    <section class="sim-grid">
        <div class="canvas-container">
            <canvas id="simCanvas"></canvas>
        </div>
        
        <div class="controls-panel">
            <h2 id="ui-title" class="stage-title">Loading...</h2>
            <div id="ui-desc" class="stage-desc">Please wait.</div>
            
            <div id="ui-dots" class="progress-dots"></div>
            
            <div class="btn-group">
                <button id="btn-prev" class="ctrl-btn btn-prev" onclick="changeStep(-1)">
                    <span class="lang-en">← Previous</span><span class="lang-zh">← 上一步</span>
                </button>
                <button id="btn-next" class="ctrl-btn btn-next" onclick="changeStep(1)">
                    <span class="lang-en">Next →</span><span class="lang-zh">下一步 →</span>
                </button>
            </div>
        </div>
    </section>

    <section class="quiz-section">
        <h2 class="quiz-header">
            <span class="lang-en">📝 HKDSE Cell Division Quiz</span>
            <span class="lang-zh">📝 HKDSE 細胞分裂測驗</span>
        </h2>
        
        <div class="info-card">
            <div class="input-group">
                <label><span class="lang-en">Student Name *</span><span class="lang-zh">學生姓名 *</span></label>
                <input type="text" id="stuName" placeholder="e.g., Chan Tai Man">
            </div>
            <div class="input-group">
                <label><span class="lang-en">Class *</span><span class="lang-zh">班別 *</span></label>
                <input type="text" id="stuClass" placeholder="e.g., 6A">
            </div>
            <div class="input-group">
                <label><span class="lang-en">Class No. *</span><span class="lang-zh">學號 *</span></label>
                <input type="text" id="stuNo" placeholder="e.g., 23">
            </div>
        </div>

        <div id="quiz-container"></div>

        <button id="submitBtn" class="submit-btn" onclick="submitQuiz()">
            <span class="lang-en">✅ Submit & Send to Mr. Daniel Ng</span>
            <span class="lang-zh">✅ 提交並發送給 Mr. Daniel Ng</span>
        </button>
        
        <div id="resultsArea" style="display: none; margin-top: 30px;">
            <div id="scoreDisplay" style="background: #d1fae5; color: #065f46; padding: 20px; border-radius: 16px; text-align: center; font-size: 1.5rem; font-weight: 900; margin-bottom: 20px;"></div>
            <div id="explanationDisplay" style="background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 25px;"></div>
        </div>
    </section>
</div>

<script>
    // ==========================================
    // 1. DATA STRUCTURES (BILINGUAL)
    // ==========================================
    let currentLang = 'en';

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'zh' : 'en';
        document.body.setAttribute('data-lang', currentLang);
        updateSimulationUI();
        renderQuiz();
    }

    const telophaseDescEN = "<b>Nuclear Reformation:</b> A new nuclear membrane forms around each of the two sets of separated chromosomes. Inside these new envelopes, the nucleolus reappears.<br><br><b>Decondensation:</b> The chromosomes, which were tightly coiled and highly condensed, uncoil and return to their diffuse, stringy state (chromatin).<br><br><b>Cytokinesis Begins:</b> Overlapping with the end of telophase, cytokinesis physically splits the cell's cytoplasm into two separate, fully functioning daughter cells.";
    
    const telophaseDescZH = "<b>核膜重組：</b> 在兩組分離的染色體周圍形成新的核膜。在這些新核膜內，核仁重新出現。<br><br><b>解聚：</b> 原本緊密捲曲和高度濃縮的染色體，解開並恢復為擴散的絲狀狀態（染色質）。<br><br><b>細胞質分裂開始：</b> 與末期結束重疊，細胞質分裂在物理上將細胞質一分為二，形成兩個獨立的子細胞。";

    const SIM_DATA = {
        mitosis: {
            stages: [
                { en: { t: "Interphase", d: "The cell grows and replicates its DNA. Chromosomes are not yet distinctly visible; they exist as loose chromatin." }, zh: { t: "間期", d: "細胞生長並複製其 DNA。此時染色體尚未清晰可見，以鬆散的染色質形態存在。" } },
                { en: { t: "Prophase", d: "Chromatin condenses into visible chromosomes (sister chromatids joined at the centromere). The nuclear envelope breaks down." }, zh: { t: "前期", d: "染色質濃縮成可見的染色體（由著絲點連接的姐妹染色單體）。核膜開始消失。" } },
                { en: { t: "Metaphase", d: "Chromosomes line up along the cell's equator (metaphase plate). Spindle fibers attach to the centromeres." }, zh: { t: "中期", d: "染色體整齊地排列在細胞赤道板上。紡錘絲附著在著絲點上。" } },
                { en: { t: "Anaphase", d: "Sister chromatids are pulled apart toward opposite poles of the cell by the spindle fibers." }, zh: { t: "後期", d: "著絲點分裂，紡錘絲將姐妹染色單體拉向細胞的兩極。" } },
                { en: { t: "Telophase", d: telophaseDescEN }, zh: { t: "末期", d: telophaseDescZH } },
                { en: { t: "Results", d: "Two completely separate, fully functioning diploid (2n) daughter cells are formed, identical to the parent cell." }, zh: { t: "結果", d: "形成兩個完全獨立且功能完整的二倍體 (2n) 子細胞，遺傳物質與母細胞完全相同。" } }
            ]
        },
        meiosis: {
            stages: [
                { en: { t: "Interphase", d: "DNA replicates before meiosis begins, forming sister chromatids." }, zh: { t: "間期", d: "減數分裂開始前 DNA 進行複製，形成姐妹染色單體。" } },
                { en: { t: "Prophase I", d: "Homologous chromosomes pair up (synapsis) and crossing over occurs, exchanging genetic material." }, zh: { t: "前期 I", d: "同源染色體配對（聯會），並發生互換（Crossing over），交換遺傳物質。" } },
                { en: { t: "Metaphase I", d: "Pairs of homologous chromosomes line up at the equator." }, zh: { t: "中期 I", d: "同源染色體「成對」排列在赤道板上。" } },
                { en: { t: "Anaphase I", d: "Homologous chromosomes separate to opposite poles. Sister chromatids remain attached." }, zh: { t: "後期 I", d: "同源染色體分離並移向兩極。注意：姐妹染色單體仍然相連。" } },
                { en: { t: "Telophase I", d: telophaseDescEN }, zh: { t: "末期 I", d: telophaseDescZH } },
                { en: { t: "Metaphase II", d: "In both cells, chromosomes line up individually at the equator." }, zh: { t: "中期 II", d: "在兩個子細胞中，染色體分別排列在赤道板上。" } },
                { en: { t: "Anaphase II", d: "Sister chromatids are finally pulled apart to opposite poles." }, zh: { t: "後期 II", d: "著絲點分裂，姐妹染色單體終於分離並移向兩極。" } },
                { en: { t: "Telophase II", d: telophaseDescEN.replace('two sets', 'four sets').replace('two separate', 'four separate') }, zh: { t: "末期 II", d: telophaseDescZH.replace('兩組', '四組').replace('兩個獨立', '四個獨立') } },
                { en: { t: "Results", d: "Four completely separate, genetically distinct haploid (n) gametes are successfully formed." }, zh: { t: "結果", d: "最終成功形成四個完全獨立、遺傳物質各不相同的單倍體 (n) 配子。" } }
            ]
        }
    };

    // ==========================================
    // 2. CANVAS ENGINE
    // ==========================================
    let currentMode = 'mitosis';
    let currentStep = 0;
    let targetStepFloat = 0;
    let currentStepFloat = 0;

    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        const container = canvas.parentElement;
        canvas.width = container.clientWidth;
        canvas.height = Math.max(container.clientHeight, 400);
    }
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('load', () => setTimeout(resizeCanvas, 100));

    function switchMode(mode) {
        currentMode = mode;
        currentStep = 0;
        targetStepFloat = 0;
        currentStepFloat = 0;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${mode}`).classList.add('active');
        updateSimulationUI();
    }

    function changeStep(dir) {
        const maxSteps = SIM_DATA[currentMode].stages.length - 1;
        currentStep += dir;
        if (currentStep < 0) currentStep = 0;
        if (currentStep > maxSteps) currentStep = maxSteps;
        targetStepFloat = currentStep;
        updateSimulationUI();
    }

    function goToStep(step) {
        currentStep = step;
        targetStepFloat = step;
        updateSimulationUI();
    }

    function updateSimulationUI() {
        const data = SIM_DATA[currentMode].stages[currentStep][currentLang];
        const maxSteps = SIM_DATA[currentMode].stages.length - 1;
        document.getElementById('ui-title').innerHTML = data.t;
        document.getElementById('ui-desc').innerHTML = data.d;
        document.getElementById('btn-prev').disabled = currentStep === 0;
        document.getElementById('btn-next').disabled = currentStep === maxSteps;
        const dotsContainer = document.getElementById('ui-dots');
        dotsContainer.innerHTML = '';
        for (let i = 0; i <= maxSteps; i++) {
            const dot = document.createElement('div');
            dot.className = `dot ${i === currentStep ? 'active' : ''}`;
            dot.onclick = () => goToStep(i);
            dotsContainer.appendChild(dot);
        }
    }

    function interp(sf, arr) {
        let idx = Math.floor(sf);
        if (idx >= arr.length - 1) return arr[arr.length - 1];
        if (idx < 0) return arr[0];
        let t = sf - idx;
        return arr[idx] + (arr[idx+1] - arr[idx]) * t;
    }

    // Helper: dotted circle (nuclear envelope)
    function drawDottedCircle(x, y, radius, alpha, lineWidth = 2, dashLen = 6, gap = 4) {
        if (alpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.setLineDash([dashLen, gap]);
        ctx.strokeStyle = "#facc15"; // golden/yellowish for nuclear membrane
        ctx.lineWidth = lineWidth;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]); // reset
        ctx.restore();
    }

    function drawCellMembrane(x, y, r, pinchAmt, alpha = 1) {
        if (alpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = "#94a3b8"; 
        ctx.lineWidth = 4;
        ctx.fillStyle = "#1e293b"; 
        ctx.beginPath();
        if (pinchAmt > 0) {
            let offset = pinchAmt * (r * 0.75);
            ctx.arc(x - offset, y, r * (1 - pinchAmt*0.25), Math.PI/2, Math.PI*1.5);
            ctx.arc(x + offset, y, r * (1 - pinchAmt*0.25), -Math.PI/2, Math.PI/2);
            ctx.closePath();
        } else {
            ctx.arc(x, y, r, 0, Math.PI*2);
        }
        ctx.fill();
        ctx.stroke();
        ctx.restore();
    }

    function drawChromatid(x, y, color, facingLeft, alpha = 1) {
        if (alpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = color;
        ctx.lineWidth = 6;
        ctx.lineCap = "round";
        ctx.beginPath();
        if (facingLeft) {
            ctx.moveTo(x + 10, y - 20); ctx.lineTo(x, y); ctx.lineTo(x + 10, y + 20);
        } else {
            ctx.moveTo(x - 10, y - 20); ctx.lineTo(x, y); ctx.lineTo(x - 10, y + 20);
        }
        ctx.stroke();
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(x, y, 3.5, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    function drawSpindles(cx, cy, r, numSpindles, separation, alpha = 1) {
        if (alpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = "rgba(16, 185, 129, 0.4)"; 
        ctx.lineWidth = 2;
        const pole1X = cx - r + 15;
        const pole2X = cx + r - 15;
        for(let i=0; i<numSpindles; i++) {
            let yOff = cy - 35 + (i * (70/((numSpindles-1) || 1)));
            ctx.beginPath(); ctx.moveTo(pole1X, cy); ctx.lineTo(cx - separation, yOff); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(pole2X, cy); ctx.lineTo(cx + separation, yOff); ctx.stroke();
        }
        ctx.fillStyle = "#f59e0b";
        ctx.fillRect(pole1X-4, cy-4, 8, 8);
        ctx.fillRect(pole2X-4, cy-4, 8, 8);
        ctx.restore();
    }

    function drawChromatin(x, y, alpha = 1) {
        if (alpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.lineWidth = 2.5;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = "#ec4899";
        ctx.beginPath();
        for (let i = 0; i < Math.PI * 5; i += 0.2) {
            let r = 25 - (i * 1.5);
            if (r < 3) r = 3;
            let px = x + Math.cos(i * 2.5) * r;
            let py = y + Math.sin(i * 3.1) * r;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.strokeStyle = "#3b82f6";
        ctx.beginPath();
        for (let i = 0; i < Math.PI * 5; i += 0.2) {
            let r = 25 - (i * 1.5);
            if (r < 3) r = 3;
            let px = x + Math.cos(i * 2.5 + Math.PI) * r;
            let py = y + Math.sin(i * 3.1 + Math.PI) * r;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.restore();
    }

    // Main drawing with dotted nuclear envelope during telophase
    function drawSimulation(sf) {
        if (!ctx || !canvas.width) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const blue = "#3b82f6";
        const pink = "#ec4899";

        if (currentMode === 'mitosis') {
            let chrAlpha = interp(sf, [0, 1, 1, 1, 0, 0]);
            let chromAlpha = interp(sf, [1, 0, 0, 0, 1, 1]);
            let pinch = interp(sf, [0, 0, 0, 0, 0.8, 0]);   // concave furrow in telophase
            let sepAlpha = interp(sf, [0, 0, 0, 0, 0, 1]);
            let mainAlpha = interp(sf, [1, 1, 1, 1, 1, 0]);
            let nucAlpha = interp(sf, [0.3, 0, 0, 0, 0.6, 0.6]);

            drawCellMembrane(cx, cy, 105, pinch, mainAlpha);
            if (sepAlpha > 0) {
                drawCellMembrane(cx - 65, cy, 55, 0, sepAlpha);
                drawCellMembrane(cx + 65, cy, 55, 0, sepAlpha);
            }

            // Chromatin and dotted nuclear envelope during telophase
            if (nucAlpha > 0) {
                if (sf < 1) {
                    drawChromatin(cx, cy, chromAlpha);
                    drawDottedCircle(cx, cy, 48, 0.3, 2, 6, 4);
                } else {
                    let nucOffset = interp(sf, [0, 0, 0, 0, 60, 65]);
                    let leftX = cx - nucOffset;
                    let rightX = cx + nucOffset;
                    drawChromatin(leftX, cy, chromAlpha);
                    drawChromatin(rightX, cy, chromAlpha);
                    // Dotted nuclear membrane around each chromatin mass
                    drawDottedCircle(leftX, cy, 42, nucAlpha, 2.2, 6, 4);
                    drawDottedCircle(rightX, cy, 42, nucAlpha, 2.2, 6, 4);
                }
            }

            let spAlpha = interp(sf, [0, 0, 1, 1, 0, 0]);
            let spSep = interp(sf, [0, 0, 0, 35, 70, 70]);
            drawSpindles(cx, cy, 105, 4, spSep, spAlpha);

            // Chromosomes (only visible when chrAlpha > 0)
            let c1y = interp(sf, [cy-30, cy-30, cy-45, cy-45, cy-15, cy-15]);
            let c1lx = interp(sf, [cx-20, cx-20, cx, cx-35, cx-60, cx-60]);
            let c1rx = interp(sf, [cx-20, cx-20, cx, cx+35, cx+60, cx+60]);
            drawChromatid(c1lx, c1y, blue, true, chrAlpha);
            drawChromatid(c1rx, c1y, blue, false, chrAlpha);
            let c2y = interp(sf, [cy+20, cy+20, cy+15, cy+15, cy+15, cy+15]);
            let c2lx = interp(sf, [cx+25, cx+25, cx, cx-35, cx-60, cx-60]);
            let c2rx = interp(sf, [cx+25, cx+25, cx, cx+35, cx+60, cx+60]);
            drawChromatid(c2lx, c2y, blue, true, chrAlpha);
            drawChromatid(c2rx, c2y, blue, false, chrAlpha);
            let c3y = interp(sf, [cy-25, cy-25, cy-15, cy-15, cy-15, cy-15]);
            let c3lx = interp(sf, [cx+30, cx+30, cx, cx-35, cx-60, cx-60]);
            let c3rx = interp(sf, [cx+30, cx+30, cx, cx+35, cx+60, cx+60]);
            drawChromatid(c3lx, c3y, pink, true, chrAlpha);
            drawChromatid(c3rx, c3y, pink, false, chrAlpha);
            let c4y = interp(sf, [cy+30, cy+30, cy+45, cy+45, cy+15, cy+15]);
            let c4lx = interp(sf, [cx-15, cx-15, cx, cx-35, cx-60, cx-60]);
            let c4rx = interp(sf, [cx-15, cx-15, cx, cx+35, cx+60, cx+60]);
            drawChromatid(c4lx, c4y, pink, true, chrAlpha);
            drawChromatid(c4rx, c4y, pink, false, chrAlpha);
        } 
        else if (currentMode === 'meiosis') {
            let chrAlpha = interp(sf, [0, 1, 1, 1, 0, 1, 1, 0, 0]);
            let chromAlpha = interp(sf, [1, 0, 0, 0, 1, 0, 0, 1, 1]);
            let alpha1 = interp(sf, [1, 1, 1, 1, 1, 0, 0, 0, 0]);
            let alpha2 = interp(sf, [0, 0, 0, 0, 0, 1, 1, 1, 0]);
            let alpha4 = interp(sf, [0, 0, 0, 0, 0, 0, 0, 0, 1]);
            let pinch1 = interp(sf, [0, 0, 0, 0, 0.8, 0, 0, 0, 0]);  // Telophase I furrow
            let pinch2 = interp(sf, [0, 0, 0, 0, 0, 0, 0, 0.8, 0]); // Telophase II furrow

            drawCellMembrane(cx, cy, 105, pinch1, alpha1);
            if (alpha2 > 0) {
                drawCellMembrane(cx - 75, cy, 75, pinch2, alpha2);
                drawCellMembrane(cx + 75, cy, 75, pinch2, alpha2);
            }
            if (alpha4 > 0) {
                drawCellMembrane(cx - 120, cy, 42, 0, alpha4);
                drawCellMembrane(cx - 40, cy, 42, 0, alpha4);
                drawCellMembrane(cx + 40, cy, 42, 0, alpha4);
                drawCellMembrane(cx + 120, cy, 42, 0, alpha4);
            }

            // Chromatin and dotted nuclear envelopes during telophase stages
            if (chromAlpha > 0) {
                if (sf < 1) {
                    drawChromatin(cx, cy, chromAlpha);
                    drawDottedCircle(cx, cy, 48, 0.4, 2, 6, 4);
                } 
                else if (sf < 5) { // Telophase I region
                    let off1 = interp(sf, [0,0,0,0, 60,60,60,60,60]);
                    let leftX = cx - off1;
                    let rightX = cx + off1;
                    drawChromatin(leftX, cy, chromAlpha);
                    drawChromatin(rightX, cy, chromAlpha);
                    drawDottedCircle(leftX, cy, 42, alpha1 * 0.7, 2.2, 6, 4);
                    drawDottedCircle(rightX, cy, 42, alpha1 * 0.7, 2.2, 6, 4);
                } 
                else { // Telophase II / Results: four cells
                    drawChromatin(cx - 120, cy, chromAlpha);
                    drawChromatin(cx - 40, cy, chromAlpha);
                    drawChromatin(cx + 40, cy, chromAlpha);
                    drawChromatin(cx + 120, cy, chromAlpha);
                    let envAlpha = alpha4 > 0 ? alpha4 * 0.7 : alpha2 * 0.6;
                    drawDottedCircle(cx - 120, cy, 32, envAlpha, 2, 5, 4);
                    drawDottedCircle(cx - 40, cy, 32, envAlpha, 2, 5, 4);
                    drawDottedCircle(cx + 40, cy, 32, envAlpha, 2, 5, 4);
                    drawDottedCircle(cx + 120, cy, 32, envAlpha, 2, 5, 4);
                }
            }

            let sp1Alpha = interp(sf, [0, 0, 1, 1, 0, 0, 0, 0, 0]);
            let sp1Sep = interp(sf, [0, 0, 15, 45, 65, 0, 0, 0, 0]);
            drawSpindles(cx, cy, 105, 2, sp1Sep, sp1Alpha);
            let sp2Alpha = interp(sf, [0, 0, 0, 0, 0, 1, 1, 0, 0]);
            let sp2Sep = interp(sf, [0, 0, 0, 0, 0, 0, 30, 45, 0]);
            if (sp2Alpha > 0) {
                drawSpindles(cx - 75, cy, 75, 2, sp2Sep, sp2Alpha);
                drawSpindles(cx + 75, cy, 75, 2, sp2Sep, sp2Alpha);
            }

            // Chromosome/chromatid drawing (only when chrAlpha > 0)
            let c1y = interp(sf,  [cy-20, cy-20, cy-20, cy-20, cy-15, cy-20, cy-20, cy-10, cy-10]);
            let c1lx = interp(sf, [cx-10, cx-10, cx-15, cx-45, cx-60, cx-75, cx-105, cx-120, cx-120]);
            let c1rx = interp(sf, [cx-10, cx-10, cx-15, cx-45, cx-60, cx-75, cx-45,  cx-40, cx-40]);
            drawChromatid(c1lx, c1y, blue, true, chrAlpha);
            drawChromatid(c1rx, c1y, blue, false, chrAlpha);
            let c3y = interp(sf,  [cy-20, cy-20, cy-20, cy-20, cy-15, cy-20, cy-20, cy-10, cy-10]);
            let c3lx = interp(sf, [cx+10, cx+10, cx+15, cx+45, cx+60, cx+75, cx+45,  cx+40, cx+40]);
            let c3rx = interp(sf, [cx+10, cx+10, cx+15, cx+45, cx+60, cx+75, cx+105, cx+120, cx+120]);
            drawChromatid(c3lx, c3y, pink, true, chrAlpha);
            drawChromatid(c3rx, c3y, pink, false, chrAlpha);
            let c2y = interp(sf,  [cy+25, cy+25, cy+20, cy+20, cy+15, cy+20, cy+20, cy+10, cy+10]);
            let c2lx = interp(sf, [cx-10, cx-10, cx-15, cx-45, cx-60, cx-75, cx-105, cx-120, cx-120]);
            let c2rx = interp(sf, [cx-10, cx-10, cx-15, cx-45, cx-60, cx-75, cx-45,  cx-40, cx-40]);
            drawChromatid(c2lx, c2y, pink, true, chrAlpha);
            drawChromatid(c2rx, c2y, pink, false, chrAlpha);
            let c4y = interp(sf,  [cy+25, cy+25, cy+20, cy+20, cy+15, cy+20, cy+20, cy+10, cy+10]);
            let c4lx = interp(sf, [cx+10, cx+10, cx+15, cx+45, cx+60, cx+75, cx+45,  cx+40, cx+40]);
            let c4rx = interp(sf, [cx+10, cx+10, cx+15, cx+45, cx+60, cx+75, cx+105, cx+120, cx+120]);
            drawChromatid(c4lx, c4y, blue, true, chrAlpha);
            drawChromatid(c4rx, c4y, blue, false, chrAlpha);
        }
    }

    function animateLoop() {
        currentStepFloat += (targetStepFloat - currentStepFloat) * 0.08;
        if (Math.abs(targetStepFloat - currentStepFloat) < 0.005) currentStepFloat = targetStepFloat;
        drawSimulation(currentStepFloat);
        requestAnimationFrame(animateLoop);
    }

    setTimeout(resizeCanvas, 100);
    switchMode('mitosis');
    animateLoop();

    // ==========================================
    // 3. QUIZ SYSTEM
    // ==========================================
    const QUIZ = [
        { en: { q: "In which stage of meiosis do homologous chromosomes separate?", options: ["Prophase I", "Anaphase I", "Anaphase II", "Telophase II"], exp: "Anaphase I separates homologous chromosomes." }, zh: { q: "在減數分裂的哪個階段，同源染色體會發生分離？", options: ["前期 I", "後期 I", "後期 II", "末期 II"], exp: "後期 I 會分離同源染色體。" }, correct: 1 },
        { en: { q: "During which phase does DNA replication occur?", options: ["Interphase", "Prophase", "Metaphase", "Anaphase"], exp: "Interphase." }, zh: { q: "DNA 複製發生在細胞週期的哪一個階段？", options: ["間期", "前期", "中期", "後期"], exp: "間期。" }, correct: 0 },
        { en: { q: "What is the primary purpose of 'crossing over' in Prophase I?", options: ["To repair damaged DNA", "To reduce the chromosome number", "To increase genetic variation", "To dissolve the nuclear envelope"], exp: "Increase genetic variation." }, zh: { q: "在前期 I 發生的「互換」的主要目的是什麼？", options: ["修復受損的 DNA", "減少染色體數目", "增加遺傳變異", "溶解核膜"], exp: "增加遺傳變異。" }, correct: 2 },
        { en: { q: "If a human skin cell (46 chromosomes) undergoes mitosis, how many chromosomes will each daughter cell have?", options: ["23", "46", "92", "4"], exp: "46." }, zh: { q: "如果一個人類皮膚細胞 (46 條染色體) 進行有絲分裂，每個子細胞將有多少條染色體？", options: ["23", "46", "92", "4"], exp: "46。" }, correct: 1 },
        { en: { q: "Which feature visually defines 'Metaphase' under a microscope?", options: ["Chromosomes align at the equator", "Chromosomes are pulled to the poles", "Nuclear envelope reforms", "Chromatin starts condensing"], exp: "Chromosomes align at equator." }, zh: { q: "在顯微鏡下觀察，哪項特徵最能定義「中期」？", options: ["染色體排列在細胞赤道板上", "染色體被拉向兩極", "核膜重新形成", "染色質開始濃縮"], exp: "染色體排列在赤道板。" }, correct: 0 }
    ];

    let userAnswers = new Array(QUIZ.length).fill(null);
    let quizSubmitted = false;

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        if (!container) return;
        container.innerHTML = '';
        QUIZ.forEach((qItem, qIdx) => {
            const data = qItem[currentLang];
            const block = document.createElement('div');
            block.className = 'q-block';
            let optionsHTML = '';
            data.options.forEach((opt, oIdx) => {
                optionsHTML += `<label class="option-label"><input type="radio" name="q${qIdx}" value="${oIdx}" ${userAnswers[qIdx] === oIdx ? 'checked' : ''} onchange="userAnswers[${qIdx}] = ${oIdx}"><span>${opt}</span></label>`;
            });
            block.innerHTML = `<div class="q-text">Q${qIdx + 1}. ${data.q}</div><div>${optionsHTML}</div>`;
            container.appendChild(block);
        });
    }

    function resetQuiz() {
        userAnswers = new Array(QUIZ.length).fill(null);
        quizSubmitted = false;
        document.getElementById('resultsArea').style.display = 'none';
        document.getElementById('submitBtn').style.opacity = '1';
        document.getElementById('submitBtn').style.pointerEvents = 'auto';
        renderQuiz();
    }

    async function submitQuiz() {
        if (quizSubmitted) { alert(currentLang === 'en' ? "Quiz already submitted!" : "測驗已提交！"); return; }
        const sName = document.getElementById('stuName').value.trim();
        const sClass = document.getElementById('stuClass').value.trim();
        const sNo = document.getElementById('stuNo').value.trim();
        if (!sName || !sClass || !sNo) { alert(currentLang === 'en' ? "Please fill in all fields." : "請填寫完整的學生資料。"); return; }
        if (userAnswers.includes(null)) { alert(currentLang === 'en' ? "Please answer all questions." : "請回答所有問題。"); return; }
        let score = 0;
        let explanationHTML = `<h3 style="font-size:1.2rem;font-weight:bold;margin-bottom:15px;">${currentLang === 'en' ? '📝 Detailed Explanations' : '📝 詳細題解'}</h3>`;
        let emailReport = `Student: ${sName} | Class: ${sClass} (${sNo})\n\n`;
        QUIZ.forEach((q, i) => {
            const isCorrect = userAnswers[i] === q.correct;
            if (isCorrect) score += 20;
            emailReport += `Q${i+1}: ${isCorrect ? 'Correct' : 'Wrong'} - Selected: ${q.en.options[userAnswers[i]]}\n`;
            explanationHTML += `<div style="margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid #e2e8f0;"><div style="font-weight:bold;color:${isCorrect ? '#10b981' : '#ef4444'};">Q${i+1} ${isCorrect ? '✅' : '❌'}</div><div style="margin-top:5px;color:#475569;"><strong>${currentLang === 'en' ? 'Correct Answer:' : '正確答案：'}</strong> ${q[currentLang].options[q.correct]}<br><strong>${currentLang === 'en' ? 'Explanation:' : '解析：'}</strong> ${q[currentLang].exp}</div></div>`;
        });
        document.getElementById('resultsArea').style.display = 'block';
        document.getElementById('scoreDisplay').innerHTML = currentLang === 'en' ? `🏆 Score: ${score} / 100` : `🏆 測驗得分：${score} / 100`;
        document.getElementById('explanationDisplay').innerHTML = explanationHTML;
        document.getElementById('submitBtn').style.opacity = '0.5';
        document.getElementById('submitBtn').style.pointerEvents = 'none';
        const formData = new FormData();
        formData.append('access_key', 'f8697ff5-0b11-4d52-9d70-657a0028e31c');
        formData.append('subject', `[Biology Quiz] ${sClass} ${sName} - Score: ${score}`);
        formData.append('email', 'ngtinghei0803@gmail.com');
        formData.append('message', emailReport);
        try { await fetch('https://api.web3forms.com/submit', { method: 'POST', body: formData }); } catch(e) {}
        quizSubmitted = true;
    }

    renderQuiz();
    window.resetQuiz = resetQuiz;
</script>
</body>
</html>
